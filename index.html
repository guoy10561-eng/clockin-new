<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>潮味決打卡系統</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
  background:#f5f7fa;
  margin:0;
  padding:24px;
  text-align:center;
}
.card{
  background:white;
  padding:24px;
  border-radius:18px;
  max-width:430px;
  margin:0 auto 20px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}
select,input,button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  font-size:16px;
  box-sizing:border-box;
}
select,input{
  border:1px solid #ddd;
}
button{
  border:none;
  background:#0f766e;
  color:white;
  font-weight:bold;
}
button:disabled{
  background:#cbd5e1;
  color:#64748b;
}
.danger{
  background:#dc2626;
}
.record{
  background:#f1f5f9;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
  text-align:left;
}
</style>
</head>

<body>

<div class="card">
  <h2>潮味決員工打卡</h2>

  <select id="employee"></select>

  <p id="status">定位中...</p>

  <div id="actionButtons"></div>
</div>

<div class="card">
  <h3>管理專區</h3>

  <input type="password" id="adminPwd" placeholder="輸入管理密碼">
  <button onclick="unlockAdmin()">解鎖管理</button>

  <div id="adminPanel" style="display:none;">
    <h3>打卡紀錄</h3>
    <div id="records"></div>

    <button onclick="exportCSV()">匯出 CSV</button>

    <input id="confirmDelete" placeholder="輸入 DELETE 才能清空">
    <button class="danger" onclick="clearRecords()">清空紀錄</button>
  </div>
</div>

<script>
const EMPLOYEES = [
  "劉淑貞","洪語婷","林芷亘",
  "劉春美","林佳恆","林禹達",
  "劉穎希","黃韋銘","李品璇",
  "黃王楷","黃啟軒"
];

const ACTIONS = ["上班","休息開始","休息結束","下班"];
const ADMIN_PASSWORD = "931119";

const SHOP = { lat:25.05068, lng:121.59259 };
const MAX_DISTANCE = 150;

let records = JSON.parse(localStorage.getItem("clock_records") || "[]");
let locationOK = false;
let distance = "";

const employeeSelect = document.getElementById("employee");

employeeSelect.innerHTML = `<option value="">請選擇員工</option>`;

EMPLOYEES.forEach(name=>{
  const opt = document.createElement("option");
  opt.value = name;
  opt.textContent = name;
  employeeSelect.appendChild(opt);
});

employeeSelect.addEventListener("change", updateButtons);

function getToday(){
  return new Date().toISOString().slice(0,10);
}

function calcDistance(lat,lng){
  const R = 6371000;
  const dLat = (SHOP.lat-lat) * Math.PI/180;
  const dLng = (SHOP.lng-lng) * Math.PI/180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat*Math.PI/180) *
    Math.cos(SHOP.lat*Math.PI/180) *
    Math.sin(dLng/2)**2;

  return Math.round(2*R*Math.asin(Math.sqrt(a)));
}

function getLocation(){
  const status = document.getElementById("status");
  status.textContent = "定位中...";

  if(!navigator.geolocation){
    status.textContent = "此裝置不支援定位";
    return;
  }

  navigator.geolocation.getCurrentPosition(pos=>{
    distance = calcDistance(pos.coords.latitude,pos.coords.longitude);
    locationOK = distance <= MAX_DISTANCE;

    status.textContent = locationOK
      ? `定位通過，距離 ${distance}m`
      : `距離太遠，距離 ${distance}m`;

    updateButtons();
  },()=>{
    status.textContent = "定位失敗，請開啟定位權限";
    locationOK = false;
    updateButtons();
  });
}

function getTodayRecords(){
  const name = employeeSelect.value;
  return records.filter(r => r.name === name && r.date === getToday());
}

function updateButtons(){
  const box = document.getElementById("actionButtons");
  const name = employeeSelect.value;

  box.innerHTML = "";

  if(!name){
    box.innerHTML = "<p>請先選擇員工</p>";
    return;
  }

  const done = getTodayRecords().map(r => r.action);

  let allowed = [];

  if(!done.includes("上班")){
    allowed = ["上班"];
  }else if(done.includes("上班") && !done.includes("休息開始") && !done.includes("下班")){
    allowed = ["休息開始","下班"];
  }else if(done.includes("休息開始") && !done.includes("休息結束")){
    allowed = ["休息結束"];
  }else if(done.includes("休息結束") && !done.includes("下班")){
    allowed = ["下班"];
  }

  ACTIONS.forEach(action=>{
    const btn = document.createElement("button");
    const isDone = done.includes(action);
    const canClick = locationOK && allowed.includes(action) && !isDone;

    btn.textContent = isDone ? `${action} ✅` : action;
    btn.disabled = !canClick;
    btn.onclick = () => clock(action);

    box.appendChild(btn);
  });
}

function clock(action){
  const name = employeeSelect.value;

  if(!name){
    alert("請先選擇員工");
    return;
  }

  if(!locationOK){
    alert("定位未通過，不能打卡");
    return;
  }

  const done = getTodayRecords().map(r => r.action);

  if(done.includes(action)){
    alert("這個已經打過卡了");
    return;
  }

  const record = {
    name,
    action,
    date:getToday(),
    time:new Date().toLocaleString("zh-TW",{hour12:false}),
    distance
  };

  records.unshift(record);
  localStorage.setItem("clock_records", JSON.stringify(records));

  alert(`${name} ${action}成功`);
  updateButtons();
  renderRecords();
}

function renderRecords(){
  const box = document.getElementById("records");

  if(records.length === 0){
    box.innerHTML = "<p>目前沒有紀錄</p>";
    return;
  }

  box.innerHTML = records.map(r=>`
    <div class="record">
      ${r.name}｜${r.action}<br>
      ${r.time}<br>
      距離：${r.distance}m
    </div>
  `).join("");
}

function unlockAdmin(){
  const pwd = document.getElementById("adminPwd").value;

  if(pwd === ADMIN_PASSWORD){
    document.getElementById("adminPanel").style.display = "block";
    document.getElementById("adminPwd").value = "";
    renderRecords();
  }else{
    alert("密碼錯誤");
  }
}

function exportCSV(){
  let csv = "姓名,動作,日期,時間,距離\n";

  records.forEach(r=>{
    csv += `${r.name},${r.action},${r.date},${r.time},${r.distance}\n`;
  });

  const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "clock-records.csv";
  a.click();
}

function clearRecords(){
  if(document.getElementById("confirmDelete").value !== "DELETE"){
    alert("請輸入 DELETE");
    return;
  }

  records = [];
  localStorage.removeItem("clock_records");
  renderRecords();
  updateButtons();
  alert("紀錄已清空");
}

updateButtons();
getLocation();
</script>

</body>
</html>
