<!DOCTYPE html>
<html>

  <title>潮味決南港昆陽店打卡</title>

<body style="font-family:sans-serif;text-align:center;padding:50px">
  <h1>潮味決南港昆陽店</h1>
  <h2>員工打卡系統</h2>

  <p id="time"></p>

  <button onclick="clockIn()" style="padding:15px;margin:10px">上班打卡</button>
  <button onclick="clockOut()" style="padding:15px;margin:10px">下班打卡</button>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const SUPABASE_URL = "https://chdznhbloctutfsenstm.supabase.co/rest/v1/";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoZHpuaGJsb2N0dXRmc2Vuc3RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTI4MDMsImV4cCI6MjA5MjY4ODgwM30.tYcDc8Yq4WLde0A6pFDG1uouHKx3j34GR_oZwu3H5zE";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function updateTime() {
  document.getElementById("time").innerText = new Date().toLocaleString();
}
setInterval(updateTime, 1000);

async function clockIn() {
  const { error } = await supabase.from("clock_records").insert([
    {
      employee_name: "員工A",
      action: "上班",
    }
  ]);

  if (error) {
    alert("打卡失敗");
  } else {
    alert("上班打卡成功！");
  }
}

async function clockOut() {
  const { error } = await supabase.from("clock_records").insert([
    {
      employee_name: "員工A",
      action: "下班",
    }
  ]);

  if (error) {
    alert("打卡失敗");
  } else {
    alert("下班打卡成功！");
  }
}
</script>
</body>
</html>
