<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>潮味決南港昆陽店打卡</title>

<style>
body{
font-family:sans-serif;
text-align:center;
padding:30px;
background:linear-gradient(270deg,#ff7e5f,#feb47b,#ff7e5f);
background-size:600% 600%;
animation:bg 10s infinite;
}
@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}
.card{
background:white;
padding:20px;
border-radius:20px;
max-width:600px;
margin:20px auto;
}
button{
padding:12px;
margin:6px;
border:none;
border-radius:12px;
background:black;
color:white;
}
select,input{
padding:10px;
margin:8px;
border-radius:10px;
}
table{
margin:auto;
border-collapse:collapse;
width:100%;
}
th,td{
border:1px solid #ccc;
padding:8px;
font-size:14px;
}
</style>
</head>

<body>

<h1 style="color:white;">潮味決南港昆陽店</h1>

<div class="card">

<p id="timeText"></p>

<select id="employee" onchange="saveLast()">
<option value="">選擇員工</option>
<option>劉淑貞</option>
<option>洪語婷</option>
<option>劉春美</option>
<option>林佳恆</option>
<option>林禹達</option>
<option>劉穎希</option>
<option>林芷亘</option>
<option>黃韋銘</option>
<option>李品璇</option>
<option>黃王楷</option>
<option>黃啟軒</option>
</select>

<p id="distance"></p>

<button onclick="clock('上班')">上班</button>
<button onclick="clock('休息開始')">休息開始</button>
<button onclick="clock('休息結束')">休息結束</button>
<button onclick="clock('下班')">下班</button>

<br><br>
<button onclick="boss()">老闆頁面</button>

</div>

<div id="bossPage" class="card" style="display:none;">
  <input type="month" id="month">
  <button onclick="exportReport()">一鍵月結算</button>
  <button onclick="loadRecords()">查看打卡紀錄</button>
  <div id="records"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL="https://chdznhbloctutfsenstm.supabase.co";
const SUPABASE_KEY="你的KEY貼這裡";
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const STORE_LAT=25.049901606435455;
const STORE_LNG=121.59244072858665;

const SHIFT={
"劉淑貞":"09:30",
"洪語婷":"10:00",
"林芷亘":"14:00"
};

const PAY={
"劉淑貞":{type:"monthly",salary:45000},
"洪語婷":{type:"monthly",salary:33000},
"林芷亘":{type:"monthly",salary:30500},
"劉春美":{type:"hourly",wage:200},
"林佳恆":{type:"hourly",wage:196},
"林禹達":{type:"hourly",wage:200},
"劉穎希":{type:"hourly",wage:196},
"黃韋銘":{type:"hourly",wage:200},
"李品璇":{type:"hourly",wage:200},
"黃王楷":{type:"hourly",wage:196},
"黃啟軒":{type:"hourly",wage:196}
};

function updateTime(){
document.getElementById("timeText").innerText=
"現在時間："+new Date().toLocaleString();
}
setInterval(updateTime,1000);
updateTime();

function dist(a,b,c,d){
let R=6371;
let dLat=(c-a)*Math.PI/180;
let dLng=(d-b)*Math.PI/180;
let x=Math.sin(dLat/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLng/2)**2;
return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function updateDistance(){
navigator.geolocation.getCurrentPosition(pos=>{
let m=Math.round(dist(pos.coords.latitude,pos.coords.longitude,STORE_LAT,STORE_LNG)*1000);
let el=document.getElementById("distance");

if(m<50){el.style.color="green";}
else if(m<100){el.style.color="orange";}
else{el.style.color="red";}

el.innerText="距離："+m+"公尺";
});
}
setInterval(updateDistance,5000);
updateDistance();

function saveLast(){
localStorage.setItem("emp",document.getElementById("employee").value);
}

window.onload=()=>{
let last=localStorage.getItem("emp");
if(last)document.getElementById("employee").value=last;
};

function isLate(name,time){
if(!SHIFT[name])return false;
let [h,m]=SHIFT[name].split(":");
let t=new Date(time);
let base=new Date(time);
base.setHours(h,m,0,0);
return t>base;
}

async function clock(type){
let name=document.getElementById("employee").value;
if(!name)return alert("選員工");

navigator.geolocation.getCurrentPosition(async pos=>{
let d=dist(pos.coords.latitude,pos.coords.longitude,STORE_LAT,STORE_LNG);
if(d>0.1)return alert("不在店附近");

let today=new Date().toLocaleDateString("zh-TW");

let {data:todayRecords,error}=await db.from("clock_records")
.select("*")
.eq("employee_name",name);

if(error){
alert("讀取失敗："+error.message);
return;
}

let todayList=todayRecords.filter(r=>
new Date(r.clock_time).toLocaleDateString("zh-TW")==today
);

if(todayList.some(r=>r.action==type)){
alert(type+" 已經打過了");
return;
}

if(type=="休息開始" && !todayList.some(r=>r.action=="上班")){
alert("請先打上班");
return;
}

if(type=="休息結束" && !todayList.some(r=>r.action=="休息開始")){
alert("還沒開始休息");
return;
}

if(type=="下班" && !todayList.some(r=>r.action=="上班")){
alert("請先打上班");
return;
}

let {error:insertError}=await db.from("clock_records").insert([{
employee_name:name,
action:type,
latitude:pos.coords.latitude,
longitude:pos.coords.longitude
}]);

if(insertError){
alert("打卡失敗："+insertError.message);
return;
}

if(type=="上班")alert("今天加油💪");
else if(type=="下班")alert("辛苦了👏");
else alert(type+"成功");

},()=>{
alert("定位失敗，請開啟定位權限");
});
}

function boss(){
let password=prompt("密碼");

if(password!="1234"){
alert("密碼錯誤");
return;
}

document.getElementById("bossPage").style.display="block";
loadRecords();
}

async function exportReport(){
let m=document.getElementById("month").value;
if(!m)return alert("選月份");

let {data,error}=await db.from("clock_records").select("*");

if(error){
alert("匯出失敗："+error.message);
return;
}

let sum={};

data.filter(r=>{
let d=new Date(r.clock_time);
return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")==m;
}).forEach(r=>{
let n=r.employee_name;

if(!sum[n])sum[n]={late:0,miss:0};

if(r.action=="上班" && isLate(n,r.clock_time))sum[n].late++;
});

let csv="員工,總薪資\n";

Object.keys(PAY).forEach(n=>{
let p=PAY[n];
let total=0;

if(p.type=="monthly"){
let full=(sum[n]?.late||0)==0;
total=p.salary+1000+(full?1000:0);
}else{
total=0;
}

csv+=n+","+total+"\n";
});

let blob=new Blob(["\uFEFF"+csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="月結薪資.csv";
a.click();
}

async function loadRecords(){
let {data,error}=await db.from("clock_records")
.select("*")
.order("clock_time",{ascending:false});

if(error){
document.getElementById("records").innerHTML="讀取失敗："+error.message;
return;
}

let html="<table>";
html+="<tr><th>員工</th><th>動作</th><th>時間</th><th>位置</th></tr>";

data.forEach(r=>{
html+=`
<tr>
<td>${r.employee_name}</td>
<td>${r.action}</td>
<td>${new Date(r.clock_time).toLocaleString()}</td>
<td>${r.latitude ? "有定位" : "無定位"}</td>
</tr>`;
});

html+="</table>";
document.getElementById("records").innerHTML=html;
}
</script>

</body>
</html>
