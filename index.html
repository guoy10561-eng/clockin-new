<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>打卡系統（測試版）</title>

<style>
body{
  font-family:sans-serif;
  text-align:center;
  padding:30px;
  background:#f5f7fa;
}
.card{
  background:white;
  padding:20px;
  border-radius:16px;
  max-width:400px;
  margin:auto;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
}
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  background:#0f766e;
  color:white;
}
button:disabled{
  background:#ccc;
}
</style>
</head>

<body>

<div class="card">
  <h2>員工打卡（測試）</h2>

  <select id="employee">
    <option value="">請選擇員工</option>
    <option>劉淑貞</option>
    <option>洪語婷</option>
    <option>劉春美</option>
  </select>

  <p id="status">定位中...</p>

  <button id="btn" disabled onclick="clock()">上班打卡</button>
</div>

<script>
const SHOP = { lat:25.05068, lng:121.59259 };
const MAX_DISTANCE = 150;

let locationOK = false;

function calcDistance(lat,lng){
  const R = 6371000;
  const dLat = (SHOP.lat-lat) * Math.PI/180;
  const dLng = (SHOP.lng-lng) * Math.PI/180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat*Math.PI/180) *
    Math.cos(SHOP.lat*Math.PI/180) *
    Math.sin(dLng/2)**2;

  return Math.round(2*R*Math.asin(Math.sqrt(a)));
}

function getLocation(){
  if(!navigator.geolocation){
    document.getElementById("status").textContent = "裝置不支援定位";
    return;
  }

  navigator.geolocation.getCurrentPosition(pos=>{
    const d = calcDistance(pos.coords.latitude,pos.coords.longitude);

    if(d <= MAX_DISTANCE){
      locationOK = true;
      document.getElementById("status").textContent = "定位通過（"+d+"m）";
    }else{
      locationOK = false;
      document.getElementById("status").textContent = "距離太遠（"+d+"m）";
    }

    updateBtn();

  }, ()=>{
    document.getElementById("status").textContent = "定位失敗";
  });
}

function updateBtn(){
  const emp = document.getElementById("employee").value;
  document.getElementById("btn").disabled = !(emp && locationOK);
}

document.getElementById("employee").addEventListener("change", updateBtn);

function clock(){
  const name = document.getElementById("employee").value;

  alert(name + " 打卡成功！");
}

getLocation();
</script>

</body>
</html>
