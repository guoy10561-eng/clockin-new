<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>潮味決南港昆陽店打卡</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <main class="min-h-screen bg-[radial-gradient(circle_at_top_left,#dcfce7,transparent_32%),linear-gradient(135deg,#f8fafc,#eef2ff)] p-4 sm:p-6 lg:p-8">
    <div id="toast" class="fixed right-4 top-4 z-50 hidden rounded-2xl px-4 py-3 text-sm font-bold text-white shadow-xl"></div>

    <div class="mx-auto max-w-7xl">
      <header class="mb-6 flex flex-col gap-4 rounded-[2rem] border border-white/70 bg-white/80 p-5 shadow-xl shadow-slate-200/60 backdrop-blur md:flex-row md:items-center md:justify-between">
        <div class="flex items-center gap-4">
          <div class="rounded-3xl bg-slate-950 p-4 text-2xl text-white shadow-lg">店</div>
          <div>
            <p class="text-sm font-medium text-slate-500">Clock-in Dashboard</p>
            <h1 class="text-2xl font-black tracking-tight sm:text-3xl">潮味決南港昆陽店打卡</h1>
          </div>
        </div>
        <div class="flex flex-wrap items-center gap-2">
          <button id="staffTab" class="rounded-full bg-slate-950 px-4 py-2 text-sm font-bold text-white transition">員工打卡</button>
          <button id="bossTab" class="rounded-full bg-white px-4 py-2 text-sm font-bold text-slate-600 transition hover:bg-slate-100">老闆頁面</button>
        </div>
      </header>

      <section id="staffView" class="grid gap-6 lg:grid-cols-[1.1fr_0.9fr]">
        <div class="space-y-6">
          <section class="rounded-[2rem] border border-white/70 bg-white/80 p-6 shadow-xl shadow-slate-200/70 backdrop-blur sm:p-8">
            <div class="flex flex-col gap-5 md:flex-row md:items-end md:justify-between">
              <div>
                <p class="text-sm font-bold text-slate-500">現在時間</p>
                <div class="mt-2 flex items-end gap-3">
                  <span class="mb-2 text-3xl text-slate-400">◷</span>
                  <p id="currentTime" class="text-5xl font-black tabular-nums tracking-tight sm:text-6xl">--:--:--</p>
                </div>
                <p id="currentDate" class="mt-2 text-slate-500">--</p>
              </div>
              <div class="rounded-3xl bg-slate-950 px-5 py-4 text-white">
                <p class="text-sm text-white/60">今日累積工時</p>
                <p id="todayDuration" class="mt-1 text-2xl font-black">0 分</p>
              </div>
            </div>
          </section>

          <section class="rounded-[2rem] border border-white/70 bg-white/80 p-6 shadow-xl shadow-slate-200/70 backdrop-blur sm:p-8">
            <div class="mb-5 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
              <div>
                <p class="text-sm font-bold text-slate-500">選擇員工</p>
                <h2 class="mt-1 text-2xl font-black">今天誰要打卡？</h2>
              </div>
              <div id="statusBadge" class="rounded-full bg-slate-100 px-4 py-2 text-sm font-black text-slate-600">尚未上班</div>
            </div>

            <div id="employeeList" class="grid grid-cols-2 gap-2 sm:grid-cols-3 lg:grid-cols-4"></div>

            <div class="mt-6 rounded-3xl bg-slate-50 p-5">
              <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
                <div>
                  <p class="text-sm font-bold text-slate-500">目前員工</p>
                  <p id="selectedEmployeeText" class="text-3xl font-black">--</p>
                </div>
                <p id="statusHint" class="text-sm font-medium text-slate-500">請先選擇員工並打上班卡</p>
              </div>
            </div>
          </section>

          <section class="grid gap-3 sm:grid-cols-2">
            <button data-action="clockIn" class="action-btn rounded-2xl border border-white/70 bg-emerald-600 p-4 text-left text-white shadow-lg transition-all hover:-translate-y-0.5 hover:bg-emerald-700">
              <div class="flex items-center justify-between gap-3"><div><p class="text-sm opacity-80">打卡動作</p><p class="mt-1 text-xl font-bold">上班</p></div><span class="rounded-2xl bg-white/20 px-4 py-3 text-2xl">➜</span></div>
            </button>
            <button data-action="breakStart" class="action-btn rounded-2xl border border-white/70 bg-amber-500 p-4 text-left text-white shadow-lg transition-all hover:-translate-y-0.5 hover:bg-amber-600">
              <div class="flex items-center justify-between gap-3"><div><p class="text-sm opacity-80">打卡動作</p><p class="mt-1 text-xl font-bold">休息開始</p></div><span class="rounded-2xl bg-white/20 px-4 py-3 text-2xl">☕</span></div>
            </button>
            <button data-action="breakEnd" class="action-btn rounded-2xl border border-white/70 bg-sky-600 p-4 text-left text-white shadow-lg transition-all hover:-translate-y-0.5 hover:bg-sky-700">
              <div class="flex items-center justify-between gap-3"><div><p class="text-sm opacity-80">打卡動作</p><p class="mt-1 text-xl font-bold">休息結束</p></div><span class="rounded-2xl bg-white/20 px-4 py-3 text-2xl">↻</span></div>
            </button>
            <button data-action="clockOut" class="action-btn rounded-2xl border border-white/70 bg-rose-600 p-4 text-left text-white shadow-lg transition-all hover:-translate-y-0.5 hover:bg-rose-700">
              <div class="flex items-center justify-between gap-3"><div><p class="text-sm opacity-80">打卡動作</p><p class="mt-1 text-xl font-bold">下班</p></div><span class="rounded-2xl bg-white/20 px-4 py-3 text-2xl">←</span></div>
            </button>
          </section>
        </div>

        <aside class="space-y-6">
          <section class="rounded-[2rem] border border-white/70 bg-white/80 p-6 shadow-xl shadow-slate-200/70 backdrop-blur">
            <h3 class="text-xl font-black">今日紀錄</h3>
            <div id="todayRecordBox" class="mt-4 space-y-3"></div>
          </section>

          <section class="rounded-[2rem] border border-white/70 bg-white/80 p-6 shadow-xl shadow-slate-200/70 backdrop-blur">
            <h3 class="text-xl font-black">今日已打卡</h3>
            <div id="todayAllBox" class="mt-4 space-y-2"></div>
          </section>
        </aside>
      </section>

      <section id="bossView" class="hidden grid gap-6 lg:grid-cols-[0.8fr_1.2fr]">
        <div class="space-y-6">
          <section class="rounded-[2rem] border border-white/70 bg-white/80 p-6 shadow-xl shadow-slate-200/70 backdrop-blur">
            <h2 class="text-2xl font-black">老闆總覽</h2>
            <div class="mt-5 grid gap-3">
              <div class="rounded-3xl bg-slate-950 p-5 text-white">
                <p class="text-sm text-white/60">本月總工時</p>
                <p id="monthlyTotal" class="mt-1 text-3xl font-black">0 分</p>
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div class="rounded-3xl bg-white p-5 shadow-sm">
                  <p class="text-sm font-bold text-slate-500">員工數</p>
                  <p id="employeeCount" class="mt-1 text-3xl font-black">0</p>
                </div>
                <div class="rounded-3xl bg-white p-5 shadow-sm">
                  <p class="text-sm font-bold text-slate-500">今日筆數</p>
                  <p id="todayCount" class="mt-1 text-3xl font-black">0</p>
                </div>
              </div>
            </div>
            <div class="mt-5 flex flex-wrap gap-2">
              <button id="exportBtn" class="rounded-2xl bg-slate-950 px-4 py-3 text-sm font-bold text-white hover:bg-slate-800">匯出 CSV</button>
              <button id="resetBtn" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-bold text-slate-700 hover:bg-slate-50">重置示範</button>
            </div>
          </section>

          <section class="rounded-[2rem] border border-white/70 bg-white/80 p-6 shadow-xl shadow-slate-200/70 backdrop-blur">
            <h3 class="text-xl font-black">一鍵月結算</h3>
            <div id="monthlySummary" class="mt-4 space-y-2"></div>
          </section>
        </div>

        <section class="rounded-[2rem] border border-white/70 bg-white/80 p-6 shadow-xl shadow-slate-200/70 backdrop-blur">
          <div class="mb-5 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
            <div>
              <p class="text-sm font-bold text-slate-500">Record Center</p>
              <h2 class="text-2xl font-black">查看打卡紀錄</h2>
            </div>
            <input id="searchInput" placeholder="搜尋員工或日期" class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-medium outline-none focus:border-slate-950 md:w-64" />
          </div>

          <div class="overflow-hidden rounded-3xl border border-slate-100 bg-white">
            <div class="hidden grid-cols-[1.1fr_1fr_1fr_1fr_1fr_1fr] gap-3 bg-slate-50 px-4 py-3 text-xs font-black text-slate-500 md:grid">
              <span>員工 / 日期</span><span>上班</span><span>休息開始</span><span>休息結束</span><span>下班</span><span>工時</span>
            </div>
            <div id="recordsTable" class="divide-y divide-slate-100"></div>
          </div>
        </section>
      </section>
    </div>
  </main>

  <script>
    const EMPLOYEES = ["劉淑貞", "洪語婷", "劉春美", "林佳恆", "林禹達", "劉穎希", "林芷亘", "黃韋銘", "李品璇", "黃王楷", "黃啟軒"];
    const STORAGE_KEY = "clockin-records-html-v1";
    const ACTION_LABELS = { clockIn: "上班", breakStart: "休息開始", breakEnd: "休息結束", clockOut: "下班" };

    let selectedEmployee = EMPLOYEES[0];
    let records = readRecords();
    let query = "";

    if (!records.length) {
      records = getDemoRecords();
      writeRecords(records);
    }

    function createId() {
      return crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function formatDateKey(date = new Date()) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function formatTime(dateLike) {
      if (!dateLike) return "--:--";
      return new Intl.DateTimeFormat("zh-TW", {
        hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false, timeZone: "Asia/Taipei"
      }).format(new Date(dateLike));
    }

    function formatFullDate(date) {
      return new Intl.DateTimeFormat("zh-TW", { dateStyle: "full", timeZone: "Asia/Taipei" }).format(date);
    }

    function formatShortDate(dateLike) {
      return new Intl.DateTimeFormat("zh-TW", { month: "2-digit", day: "2-digit", weekday: "short", timeZone: "Asia/Taipei" }).format(new Date(dateLike));
    }

    function minutesBetween(start, end) {
      if (!start || !end) return 0;
      return Math.max(0, Math.round((new Date(end).getTime() - new Date(start).getTime()) / 60000));
    }

    function formatDuration(minutes) {
      const h = Math.floor(minutes / 60);
      const m = minutes % 60;
      return h <= 0 ? `${m} 分` : `${h} 小時 ${m} 分`;
    }

    function calculateWorkMinutes(record, now = new Date()) {
      if (!record || !record.clockIn) return 0;
      const end = record.clockOut || now;
      const gross = minutesBetween(record.clockIn, end);
      const breakMinutes = record.breakStart ? minutesBetween(record.breakStart, record.breakEnd || now) : 0;
      return Math.max(0, gross - breakMinutes);
    }

    function readRecords() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
      catch { return []; }
    }

    function writeRecords(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function getDemoRecords() {
      const now = new Date();
      const y = new Date(now); y.setDate(now.getDate() - 1);
      const t = new Date(now); t.setDate(now.getDate() - 2);
      const d1 = formatDateKey(y);
      const d2 = formatDateKey(t);
      return [
        { id: createId(), employee: "林佳恆", date: d1, clockIn: `${d1}T10:02:00+08:00`, breakStart: `${d1}T14:21:00+08:00`, breakEnd: `${d1}T15:02:00+08:00`, clockOut: `${d1}T20:08:00+08:00`, updatedAt: new Date().toISOString() },
        { id: createId(), employee: "洪語婷", date: d2, clockIn: `${d2}T09:58:00+08:00`, breakStart: `${d2}T13:54:00+08:00`, breakEnd: `${d2}T14:26:00+08:00`, clockOut: `${d2}T19:56:00+08:00`, updatedAt: new Date().toISOString() }
      ];
    }

    function getTodayRecord() {
      const today = formatDateKey(new Date());
      return records.find(r => r.employee === selectedEmployee && r.date === today);
    }

    function getStatus(record) {
      if (!record || !record.clockIn) return { label: "尚未上班", hint: "請先選擇員工並打上班卡", cls: "bg-slate-100 text-slate-600" };
      if (record.clockOut) return { label: "今日已下班", hint: `下班時間 ${formatTime(record.clockOut)}`, cls: "bg-slate-100 text-slate-600" };
      if (record.breakStart && !record.breakEnd) return { label: "休息中", hint: `休息開始 ${formatTime(record.breakStart)}`, cls: "bg-amber-100 text-amber-700" };
      return { label: "上班中", hint: `上班時間 ${formatTime(record.clockIn)}`, cls: "bg-emerald-100 text-emerald-700" };
    }

    function validateAction(record, action) {
      if (action === "clockIn" && record?.clockIn && !record?.clockOut) return "今天已經上班了，別重複打卡。";
      if (action === "clockIn" && record?.clockOut) return "今天已經完成下班，不能再次上班。";
      if (action === "breakStart" && !record?.clockIn) return "還沒上班，不能先休息。";
      if (action === "breakStart" && record?.clockOut) return "今天已經下班了。";
      if (action === "breakStart" && record?.breakStart && !record?.breakEnd) return "已經在休息中了。";
      if (action === "breakStart" && record?.breakStart && record?.breakEnd) return "今天已經休息過了。";
      if (action === "breakEnd" && !record?.breakStart) return "尚未開始休息。";
      if (action === "breakEnd" && record?.breakEnd) return "休息已經結束了。";
      if (action === "clockOut" && !record?.clockIn) return "還沒上班，不能下班。";
      if (action === "clockOut" && record?.breakStart && !record?.breakEnd) return "休息尚未結束，先打休息結束。";
      if (action === "clockOut" && record?.clockOut) return "今天已經下班了。";
      return "";
    }

    function showToast(type, text) {
      const toast = document.getElementById("toast");
      toast.textContent = text;
      toast.className = `fixed right-4 top-4 z-50 rounded-2xl px-4 py-3 text-sm font-bold text-white shadow-xl ${type === "success" ? "bg-emerald-600" : "bg-rose-600"}`;
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => toast.classList.add("hidden"), 2600);
    }

    function handleAction(action) {
      const today = formatDateKey(new Date());
      const todayRecord = getTodayRecord();
      const error = validateAction(todayRecord, action);
      if (error) return showToast("error", error);

      const stamp = new Date().toISOString();
      const base = todayRecord || { id: createId(), employee: selectedEmployee, date: today, updatedAt: stamp };
      const nextRecord = { ...base, [action]: stamp, updatedAt: stamp };
      records = todayRecord ? records.map(r => r.id === todayRecord.id ? nextRecord : r) : [nextRecord, ...records];
      writeRecords(records);
      showToast("success", `${selectedEmployee} ${ACTION_LABELS[action]}成功：${formatTime(stamp)}`);
      render();
    }

    function switchView(view) {
      document.getElementById("staffView").classList.toggle("hidden", view !== "staff");
      document.getElementById("bossView").classList.toggle("hidden", view !== "boss");
      document.getElementById("bossView").classList.toggle("grid", view === "boss");
      document.getElementById("staffTab").className = view === "staff" ? "rounded-full bg-slate-950 px-4 py-2 text-sm font-bold text-white transition" : "rounded-full bg-white px-4 py-2 text-sm font-bold text-slate-600 transition hover:bg-slate-100";
      document.getElementById("bossTab").className = view === "boss" ? "rounded-full bg-slate-950 px-4 py-2 text-sm font-bold text-white transition" : "rounded-full bg-white px-4 py-2 text-sm font-bold text-slate-600 transition hover:bg-slate-100";
      render();
    }

    function getMonthlySummary() {
      const month = formatDateKey(new Date()).slice(0, 7);
      const map = new Map();
      records.filter(r => r.date.startsWith(month)).forEach(r => {
        const item = map.get(r.employee) || { employee: r.employee, days: 0, minutes: 0 };
        item.days += r.clockIn ? 1 : 0;
        item.minutes += calculateWorkMinutes(r, r.clockOut ? new Date(r.clockOut) : new Date());
        map.set(r.employee, item);
      });
      return [...map.values()].sort((a, b) => b.minutes - a.minutes);
    }

    function exportCsv() {
      const filtered = getFilteredRecords();
      const rows = [["員工", "日期", "上班", "休息開始", "休息結束", "下班", "工時分鐘"], ...filtered.map(r => [r.employee, r.date, formatTime(r.clockIn), formatTime(r.breakStart), formatTime(r.breakEnd), formatTime(r.clockOut), calculateWorkMinutes(r, r.clockOut ? new Date(r.clockOut) : new Date())])];
      const csv = rows.map(row => row.map(cell => `"${String(cell).replaceAll('"', '""')}"`).join(",")).join("
");
      const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `clockin-${formatDateKey(new Date())}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function getFilteredRecords() {
      return records.filter(r => !query || r.employee.includes(query) || r.date.includes(query)).sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
    }

    function renderEmployees() {
      const box = document.getElementById("employeeList");
      box.innerHTML = EMPLOYEES.map(name => `
        <button data-employee="${name}" class="rounded-2xl border px-4 py-3 text-left text-sm font-bold transition-all ${selectedEmployee === name ? "border-slate-950 bg-slate-950 text-white shadow-lg" : "border-slate-200 bg-white text-slate-700 hover:border-slate-400 hover:bg-slate-50"}">${name}</button>
      `).join("");
      box.querySelectorAll("button").forEach(btn => btn.addEventListener("click", () => { selectedEmployee = btn.dataset.employee; render(); }));
    }

    function render() {
      const now = new Date();
      const today = formatDateKey(now);
      const todayRecord = getTodayRecord();
      const status = getStatus(todayRecord);
      const todayAll = records.filter(r => r.date === today);
      const summary = getMonthlySummary();

      document.getElementById("currentTime").textContent = formatTime(now);
      document.getElementById("currentDate").textContent = formatFullDate(now);
      document.getElementById("todayDuration").textContent = formatDuration(calculateWorkMinutes(todayRecord, now));
      document.getElementById("selectedEmployeeText").textContent = selectedEmployee;
      document.getElementById("statusBadge").textContent = status.label;
      document.getElementById("statusBadge").className = `rounded-full px-4 py-2 text-sm font-black ${status.cls}`;
      document.getElementById("statusHint").textContent = status.hint;

      renderEmployees();

      document.querySelectorAll(".action-btn").forEach(btn => {
        const action = btn.dataset.action;
        const blocked = Boolean(validateAction(todayRecord, action));
        btn.classList.toggle("opacity-50", blocked);
      });

      document.getElementById("todayRecordBox").innerHTML = [
        ["上班", todayRecord?.clockIn], ["休息開始", todayRecord?.breakStart], ["休息結束", todayRecord?.breakEnd], ["下班", todayRecord?.clockOut]
      ].map(([label, value]) => `
        <div class="flex items-center justify-between rounded-2xl bg-slate-50 px-4 py-3">
          <span class="font-bold text-slate-600">${label}</span><span class="font-black tabular-nums">${formatTime(value)}</span>
        </div>
      `).join("");

      document.getElementById("todayAllBox").innerHTML = todayAll.length ? todayAll.map(r => `
        <div class="flex items-center justify-between rounded-2xl border border-slate-100 bg-white px-4 py-3">
          <div><p class="font-black">${r.employee}</p><p class="text-xs text-slate-500">${getStatus(r).label}</p></div>
          <p class="text-sm font-bold text-slate-500">${formatDuration(calculateWorkMinutes(r, now))}</p>
        </div>
      `).join("") : `<p class="rounded-2xl bg-slate-50 p-4 text-sm text-slate-500">今天還沒有人打卡。很安靜，安靜到有點可疑。</p>`;

      document.getElementById("employeeCount").textContent = EMPLOYEES.length;
      document.getElementById("todayCount").textContent = todayAll.length;
      document.getElementById("monthlyTotal").textContent = formatDuration(summary.reduce((sum, item) => sum + item.minutes, 0));
      document.getElementById("monthlySummary").innerHTML = summary.length ? summary.map(item => `
        <div class="flex items-center justify-between rounded-2xl bg-slate-50 px-4 py-3">
          <div><p class="font-black">${item.employee}</p><p class="text-xs text-slate-500">出勤 ${item.days} 天</p></div>
          <p class="font-black">${formatDuration(item.minutes)}</p>
        </div>
      `).join("") : `<p class="rounded-2xl bg-slate-50 p-4 text-sm text-slate-500">本月還沒有紀錄。</p>`;

      document.getElementById("recordsTable").innerHTML = getFilteredRecords().map(r => `
        <div class="grid gap-3 px-4 py-4 text-sm md:grid-cols-[1.1fr_1fr_1fr_1fr_1fr_1fr] md:items-center">
          <div><p class="font-black">${r.employee}</p><p class="text-xs text-slate-500">${formatShortDate(r.clockIn || `${r.date}T00:00:00+08:00`)}</p></div>
          <p class="font-bold tabular-nums">${formatTime(r.clockIn)}</p>
          <p class="font-bold tabular-nums">${formatTime(r.breakStart)}</p>
          <p class="font-bold tabular-nums">${formatTime(r.breakEnd)}</p>
          <p class="font-bold tabular-nums">${formatTime(r.clockOut)}</p>
          <p class="font-black">${formatDuration(calculateWorkMinutes(r, r.clockOut ? new Date(r.clockOut) : now))}</p>
        </div>
      `).join("");
    }

    document.getElementById("staffTab").addEventListener("click", () => switchView("staff"));
    document.getElementById("bossTab").addEventListener("click", () => switchView("boss"));
    document.querySelectorAll(".action-btn").forEach(btn => btn.addEventListener("click", () => handleAction(btn.dataset.action)));
    document.getElementById("searchInput").addEventListener("input", e => { query = e.target.value.trim(); render(); });
    document.getElementById("exportBtn").addEventListener("click", exportCsv);
    document.getElementById("resetBtn").addEventListener("click", () => { records = getDemoRecords(); writeRecords(records); showToast("success", "已重置示範資料。"); render(); });

    render();
    setInterval(render, 1000);
  </script>
</body>
</html>
