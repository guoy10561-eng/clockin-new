<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>潮味決南港昆陽店打卡測試版</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;color:#0f172a;background:linear-gradient(-45deg,#f8fafc,#eef2ff,#dcfce7,#e0f2fe);background-size:400% 400%;animation:bgMove 16s ease infinite}
    @keyframes bgMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    .page{max-width:1150px;margin:0 auto;padding:20px 20px 90px}.header,.card{background:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.8);border-radius:24px;box-shadow:0 16px 42px rgba(15,23,42,.08);backdrop-filter:blur(10px)}.header{padding:20px;display:flex;justify-content:space-between;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:18px}h1,h2,h3,p{margin:0}h1{font-size:26px;font-weight:950}h2{font-size:21px;font-weight:950;margin-bottom:12px}h3{font-size:18px;font-weight:950;margin-bottom:12px}.muted{color:#64748b;font-size:13px}.tabs{display:flex;gap:8px}button{border:0;cursor:pointer;font-weight:850;border-radius:16px;transition:.15s ease;font-size:15px;touch-action:manipulation}button:hover{transform:translateY(-1px)}button:disabled{cursor:not-allowed;transform:none}.tab{padding:10px 16px;background:#fff;color:#475569;border:1px solid #e2e8f0}.tab.active{background:#020617;color:#fff;border-color:#020617}.grid{display:grid;grid-template-columns:1.05fr .95fr;gap:18px}.card{padding:22px;margin-bottom:18px}.timeRow{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;align-items:flex-end}.time{font-size:52px;font-weight:950;letter-spacing:-1px;font-variant-numeric:tabular-nums}.summaryBox{background:#020617;color:white;border-radius:22px;padding:18px;min-width:190px}.summaryBox .big{font-size:24px;font-weight:950;margin-top:4px}.employees{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.employeeBtn{padding:14px;background:#fff;color:#334155;border:1px solid #e2e8f0;text-align:left}.employeeBtn.active{background:#020617;color:#fff;border-color:#020617}.statusPanel{margin-top:16px;background:#f8fafc;border-radius:22px;padding:16px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.name{font-size:28px;font-weight:950}.badge{display:inline-block;padding:9px 14px;border-radius:999px;font-size:14px;font-weight:900}.badge.gray{background:#f1f5f9;color:#475569}.badge.green{background:#dcfce7;color:#15803d}.badge.yellow{background:#fef3c7;color:#b45309}.actions{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.action{color:#fff;padding:20px;min-height:88px;text-align:left;box-shadow:0 12px 28px rgba(15,23,42,.12)}.action small{display:block;opacity:.82;margin-bottom:5px}.action span{font-size:22px;display:block}.greenBtn{background:#059669}.yellowBtn{background:#f59e0b}.blueBtn{background:#0284c7}.redBtn{background:#e11d48}.action.disabled{background:#e2e8f0!important;color:#94a3b8;box-shadow:none}.row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:13px 14px;background:#f8fafc;border-radius:16px;margin-bottom:8px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.darkBtn{background:#020617;color:#fff;padding:12px 16px}.lightBtn{background:#fff;color:#334155;border:1px solid #e2e8f0;padding:12px 16px}input{width:100%;max-width:280px;border:1px solid #cbd5e1;border-radius:14px;padding:12px 14px;font-size:15px;outline:none;background:#fff}.tableWrap{overflow:auto}.tableHeader,.recordLine{display:grid;grid-template-columns:1fr .8fr .8fr .8fr .8fr .8fr .8fr;gap:10px;align-items:center}.tableHeader{min-width:780px;padding:12px;background:#f8fafc;color:#64748b;font-size:13px;font-weight:900;border-radius:16px}.recordLine{min-width:780px;padding:14px 12px;border-bottom:1px solid #e2e8f0;font-size:14px}.salaryLine{display:grid;grid-template-columns:1fr .75fr .75fr .75fr .75fr .75fr .85fr;gap:10px;align-items:center;padding:13px 12px;border-bottom:1px solid #e2e8f0;font-size:14px;min-width:820px}.salaryHeader{background:#f8fafc;color:#64748b;font-weight:900;border-radius:16px}.hidden{display:none!important}#toast{position:fixed;right:18px;top:18px;z-index:99;color:#fff;border-radius:16px;padding:13px 16px;font-weight:900;box-shadow:0 18px 38px rgba(15,23,42,.22);max-width:calc(100vw - 36px)}#toast.success{background:#059669}#toast.error{background:#e11d48}#distanceBox{position:fixed;right:16px;bottom:16px;z-index:80;background:#020617;color:#fff;padding:11px 14px;border-radius:16px;font-size:13px;font-weight:850;box-shadow:0 14px 28px rgba(15,23,42,.22);max-width:calc(100vw - 32px)}#distanceBox.ok{background:#059669}#distanceBox.bad{background:#e11d48}.modal{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;z-index:120;padding:16px}.modal.show{display:flex}.modalBox{background:#fff;border-radius:22px;padding:22px;width:min(360px,100%);box-shadow:0 24px 60px rgba(0,0,0,.25)}.modalBox input{max-width:100%;margin:12px 0}.modalActions{display:flex;gap:8px}@media(max-width:850px){.page{padding:14px 14px 86px}.grid{grid-template-columns:1fr}.employees{grid-template-columns:repeat(2,1fr)}.time{font-size:42px}.actions{grid-template-columns:1fr}.tableHeader{display:none}.recordLine,.salaryLine{grid-template-columns:1fr 1fr;min-width:0;border:1px solid #e2e8f0;border-radius:16px;margin-bottom:10px}.salaryHeader{display:none}}
  </style>
</head>
<body>
  <div id="toast" class="hidden"></div>
  <div id="distanceBox">尚未取得定位距離</div>
  <div id="passwordModal" class="modal">
    <div class="modalBox">
      <h3>老闆頁面</h3>
      <p class="muted">請輸入密碼</p>
      <input id="passwordInput" type="password" placeholder="密碼" />
      <div class="modalActions">
        <button id="passwordSubmit" class="darkBtn" type="button">確認</button>
        <button id="passwordCancel" class="lightBtn" type="button">取消</button>
      </div>
    </div>
  </div>

  <main class="page">
    <header class="header">
      <div><p class="muted">Clock-in Test Version</p><h1>潮味決南港昆陽店打卡</h1></div>
      <div class="tabs"><button id="staffTab" class="tab active" type="button">員工打卡</button><button id="bossTab" class="tab" type="button">老闆頁面</button></div>
    </header>

    <section id="staffView" class="grid">
      <div>
        <section class="card"><div class="timeRow"><div><p class="muted">現在時間</p><p id="currentTime" class="time">--:--:--</p><p id="currentDate" class="muted">--</p></div><div class="summaryBox"><p class="muted" style="color:#cbd5e1">目前員工</p><p id="currentEmployeeMini" class="big">--</p></div></div></section>
        <section class="card"><div style="display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px"><div><p class="muted">選擇員工</p><h2>今天誰要打卡？</h2></div><span id="statusBadge" class="badge gray">尚未上班</span></div><div id="employeeList" class="employees"></div><div class="statusPanel"><div><p class="muted">目前員工</p><p id="selectedEmployeeText" class="name">--</p></div><p id="statusHint" class="muted">請先選擇員工並打上班卡</p></div></section>
        <section class="actions"><button class="action greenBtn" type="button" data-action="clockIn"><small>打卡動作</small><span>上班</span></button><button class="action yellowBtn" type="button" data-action="breakStart"><small>打卡動作</small><span>休息開始</span></button><button class="action blueBtn" type="button" data-action="breakEnd"><small>打卡動作</small><span>休息結束</span></button><button class="action redBtn" type="button" data-action="clockOut"><small>打卡動作</small><span>下班</span></button></section>
      </div>
      <aside><section class="card"><h3>員工端提示</h3><p class="muted">員工端不顯示打卡紀錄與薪資，只顯示成功或失敗提示。老闆頁可查看紀錄與薪資測算。</p></section></aside>
    </section>

    <section id="bossView" class="grid hidden">
      <div>
        <section class="card"><h2>老闆總覽</h2><div class="summaryBox"><p class="muted" style="color:#cbd5e1">本月預估總薪資</p><p id="totalPayroll" class="big">$0</p></div><div class="toolbar"><button id="exportRecordsBtn" class="darkBtn" type="button">匯出打卡 CSV</button><button id="exportSalaryBtn" class="darkBtn" type="button">匯出薪資 CSV</button><button id="clearBtn" class="lightBtn" type="button">清空測試資料</button></div></section>
        <section class="card"><h3>薪資明細</h3><div class="tableWrap"><div id="salaryBox"></div></div></section>
      </div>
      <section class="card"><div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:14px"><div><p class="muted">Record Center</p><h2>打卡紀錄</h2></div><input id="searchInput" placeholder="搜尋員工或日期" /></div><div class="tableWrap"><div class="tableHeader"><span>員工/日期</span><span>上班</span><span>休息開始</span><span>休息結束</span><span>下班</span><span>工時</span><span>休息</span></div><div id="recordsTable"></div></div></section>
    </section>
  </main>

  <script>
    const EMPLOYEES = ["劉淑貞","洪語婷","劉春美","林佳恆","林禹達","劉穎希","林芷亘","黃韋銘","李品璇","黃王楷","黃啟軒"];
    const STORAGE_KEY = "clockin-test-v1";
    const BOSS_PASSWORD = "931119";
    const STORE_LAT = 25.0505;
    const STORE_LNG = 121.5937;
    const MAX_DISTANCE = 100;
    const ACTION_TEXT = { clockIn:"今天加油", breakStart:"休息一下吧", breakEnd:"再努力一下", clockOut:"今天辛苦了" };
    const STAFF = {
      "劉淑貞":{type:"monthly",salary:45000,start:"09:30",end:"18:00",shift:"morning"},
      "洪語婷":{type:"monthly",salary:33000,start:"10:00",end:"18:30",shift:"morning"},
      "劉春美":{type:"hourly",rate:200,start:"11:30",end:"18:00",shift:"morning"},
      "林佳恆":{type:"hourly",rate:196,start:"12:00",end:"16:00",shift:"morning"},
      "林禹達":{type:"hourly",rate:200,start:"12:00",end:"18:00",shift:"morning"},
      "劉穎希":{type:"hourly",rate:196,start:"12:00",end:"18:00",shift:"morning"},
      "林芷亘":{type:"monthly",salary:30500,start:"14:00",end:"22:00",shift:"night"},
      "黃韋銘":{type:"hourly",rate:200,start:"18:00",end:"22:00",shift:"night"},
      "李品璇":{type:"hourly",rate:200,start:"18:00",end:"22:00",shift:"night"},
      "黃王楷":{type:"hourly",rate:196,start:"18:00",end:"22:00",shift:"night"},
      "黃啟軒":{type:"hourly",rate:196,start:"18:00",end:"22:00",shift:"night"}
    };
    let selectedEmployee = EMPLOYEES[0];
    let records = [];
    let query = "";
    let bossUnlocked = false;
    let isPunching = false;

    function $(id){return document.getElementById(id)}
    function makeId(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
    function dateKey(d=new Date()){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
    function monthKey(d=new Date()){return dateKey(d).slice(0,7)}
    function fmtTime(v){if(!v)return "--:--";return new Intl.DateTimeFormat("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}).format(new Date(v))}
    function fmtDate(d){return new Intl.DateTimeFormat("zh-TW",{dateStyle:"full"}).format(d)}
    function money(n){return "$"+Math.round(n).toLocaleString("zh-TW")}
    function minutesBetween(a,b){if(!a||!b)return 0;return Math.max(0,Math.round((new Date(b)-new Date(a))/60000))}
    function duration(min){const h=Math.floor(min/60),m=min%60;return h?`${h}小時${m}分`:`${m}分`}
    function timeToDate(date,time){return new Date(`${date}T${time}:00+08:00`)}
    function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(records))}
    function load(){try{records=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]")}catch(e){records=[]}}
    function todayRecord(){const d=dateKey();return records.find(r=>r.employee===selectedEmployee&&r.date===d)}
    function getBreakMinutes(r,endTime){if(!r||!r.breakStart)return 0;return minutesBetween(r.breakStart,r.breakEnd||r.clockOut||endTime||new Date())}
    function getWorkMinutes(r,now=new Date()){if(!r||!r.clockIn)return 0;if(!r.clockOut)return minutesBetween(r.clockIn,now)-getBreakMinutes(r,now);return Math.max(0,minutesBetween(r.clockIn,r.clockOut)-getBreakMinutes(r,r.clockOut))}
    function getStatus(r){if(!r||!r.clockIn)return{label:"尚未上班",hint:"請先選擇員工並打上班卡",color:"gray"};if(r.clockOut)return{label:"今日已下班",hint:`下班時間 ${fmtTime(r.clockOut)}`,color:"gray"};if(r.breakStart&&!r.breakEnd)return{label:"休息中",hint:`休息開始 ${fmtTime(r.breakStart)}`,color:"yellow"};return{label:"上班中",hint:`上班時間 ${fmtTime(r.clockIn)}`,color:"green"}}
    function validate(r,action){if(action==="clockIn"&&r&&r.clockIn&&!r.clockOut)return"今天已經上班了。";if(action==="clockIn"&&r&&r.clockOut)return"今天已經完成下班。測試版暫不開放分段班。";if(action==="breakStart"&&(!r||!r.clockIn))return"還沒上班，不能休息。";if(action==="breakStart"&&r.clockOut)return"今天已經下班了。";if(action==="breakStart"&&r.breakStart&&!r.breakEnd)return"已經在休息中了。";if(action==="breakStart"&&r.breakStart&&r.breakEnd)return"今天已經休息過了。";if(action==="breakEnd"&&(!r||!r.breakStart))return"尚未開始休息。";if(action==="breakEnd"&&r.breakEnd)return"休息已經結束了。";if(action==="clockOut"&&(!r||!r.clockIn))return"還沒上班，不能下班。";if(action==="clockOut"&&r.breakStart&&!r.breakEnd)return"休息尚未結束，先打休息結束。";if(action==="clockOut"&&r.clockOut)return"今天已經下班了。";return""}
    function toast(type,text){const el=$("toast");el.className=type;el.textContent=text;clearTimeout(window.toastTimer);window.toastTimer=setTimeout(()=>el.className="hidden",2600)}
    function vibrate(ok){if(navigator.vibrate)navigator.vibrate(ok?50:[100,50,100])}
    function distanceMeters(a,b,c,d){const R=6371e3,p1=a*Math.PI/180,p2=c*Math.PI/180,dp=(c-a)*Math.PI/180,dl=(d-b)*Math.PI/180,x=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
    function setDistance(text,state){const el=$("distanceBox");el.textContent=text;el.className=state||""}
    function checkLocation(cb){setDistance("正在取得定位...","");if(!navigator.geolocation){setDistance("裝置不支援定位","bad");vibrate(false);cb(false,"裝置不支援定位");return}navigator.geolocation.getCurrentPosition(pos=>{const dist=distanceMeters(pos.coords.latitude,pos.coords.longitude,STORE_LAT,STORE_LNG);const ok=dist<=MAX_DISTANCE;setDistance(`距離店面：約 ${Math.round(dist)} 公尺`,ok?"ok":"bad");vibrate(ok);cb(ok,ok?"":`距離過遠：約 ${Math.round(dist)} 公尺`)},()=>{setDistance("無法取得定位，請允許定位權限","bad");vibrate(false);cb(false,"無法取得定位，請允許定位權限")},{enableHighAccuracy:true,timeout:10000,maximumAge:30000})}
    function punch(action){if(isPunching)return;const r=todayRecord();const error=validate(r,action);if(error){toast("error",error);vibrate(false);return}isPunching=true;render();checkLocation((ok,msg)=>{if(!ok){toast("error",msg);isPunching=false;render();return}const stamp=new Date().toISOString();let rec=todayRecord();if(rec){rec={...rec,[action]:stamp,updatedAt:stamp};records=records.map(x=>x.id===rec.id?rec:x)}else{rec={id:makeId(),employee:selectedEmployee,date:dateKey(),clockIn:stamp,updatedAt:stamp};records.unshift(rec)}save();toast("success",ACTION_TEXT[action]);isPunching=false;render()})}
    function isLate(r){if(!r||!r.clockIn)return false;const s=STAFF[r.employee];if(!s)return false;return new Date(r.clockIn)>timeToDate(r.date,s.start)}
    function overtimeMinutes(r){if(!r||!r.clockOut)return 0;const s=STAFF[r.employee];if(!s)return 0;const date=r.date;const start=s.shift==="night"?timeToDate(date,"22:10"):timeToDate(date,"18:10");const end=s.shift==="night"?timeToDate(date,"22:30"):timeToDate(date,"18:30");const out=new Date(r.clockOut);if(out<=start)return 0;return Math.max(0,Math.round((Math.min(out,end)-start)/60000))}
    function filteredRecords(){return records.filter(r=>!query||r.employee.includes(query)||r.date.includes(query)).sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt))}
    function monthlyRecords(name){const m=monthKey();return records.filter(r=>r.employee===name&&r.date.startsWith(m))}
    function calcSalary(name){const s=STAFF[name];const rs=monthlyRecords(name);let work=0,rest=0,ot=0,late=false,missing=false,meal=0;rs.forEach(r=>{const w=getWorkMinutes(r,r.clockOut?new Date(r.clockOut):new Date());const br=getBreakMinutes(r,r.clockOut||new Date());work+=w;rest+=br;ot+=overtimeMinutes(r);if(isLate(r))late=true;if(!r.clockIn||!r.clockOut)missing=true;if(s.type==="hourly"){if(w>=300)meal+=100;else if(w>=240)meal+=50}});let base=0,otPay=0,attendance=0,total=0;if(s.type==="monthly"){base=s.salary;meal=1000;otPay=ot/60*200;attendance=(!late&&!missing&&rs.length>0)?1000:0;total=base+meal+otPay+attendance}else{base=work/60*s.rate;const morningHours=s.shift==="morning"?work/60:0;const nightHours=s.shift==="night"?work/60:0;attendance=(!late&&((morningHours>=80)||(nightHours>=60)))?1000:0;total=base+meal+attendance}return{name,type:s.type==="monthly"?"月薪":"時薪",work,rest,ot,base,otPay,meal,attendance,total,late,missing}}
    function switchView(view){if(view==="boss"&&!bossUnlocked){$("passwordModal").classList.add("show");$("passwordInput").focus();return}$("staffView").classList.toggle("hidden",view!=="staff");$("bossView").classList.toggle("hidden",view!=="boss");$("staffTab").classList.toggle("active",view==="staff");$("bossTab").classList.toggle("active",view==="boss");render()}
    function renderEmployees(){$("employeeList").innerHTML=EMPLOYEES.map(n=>`<button type="button" class="employeeBtn ${n===selectedEmployee?"active":""}" data-name="${n}">${n}</button>`).join("");document.querySelectorAll(".employeeBtn").forEach(b=>b.onclick=()=>{selectedEmployee=b.dataset.name;render()})}
    function render(){const now=new Date(),r=todayRecord(),st=getStatus(r);$("currentTime").textContent=fmtTime(now);$("currentDate").textContent=fmtDate(now);$("selectedEmployeeText").textContent=selectedEmployee;$("currentEmployeeMini").textContent=selectedEmployee;$("statusHint").textContent=st.hint;$("statusBadge").textContent=st.label;$("statusBadge").className=`badge ${st.color}`;renderEmployees();document.querySelectorAll(".action").forEach(b=>{const dis=Boolean(validate(r,b.dataset.action))||isPunching;b.classList.toggle("disabled",dis);b.disabled=isPunching});renderBoss(now)}
    function renderBoss(now){const salaries=EMPLOYEES.map(calcSalary);$("totalPayroll").textContent=money(salaries.reduce((a,b)=>a+b.total,0));$("salaryBox").innerHTML=`<div class="salaryLine salaryHeader"><span>員工</span><span>類型</span><span>工時</span><span>休息</span><span>加班</span><span>餐費/全勤</span><span>總薪資</span></div>`+salaries.map(x=>`<div class="salaryLine"><strong>${x.name}</strong><span>${x.type}</span><span>${duration(x.work)}</span><span>${duration(x.rest)}</span><span>${x.ot}分</span><span>${money(x.meal)} / ${money(x.attendance)}</span><strong>${money(x.total)}</strong></div>`).join("");$("recordsTable").innerHTML=filteredRecords().map(r=>`<div class="recordLine"><div><strong>${r.employee}</strong><br><span class="muted">${r.date}${isLate(r)?"｜遲到":""}</span></div><span>${fmtTime(r.clockIn)}</span><span>${fmtTime(r.breakStart)}</span><span>${fmtTime(r.breakEnd)}</span><span>${fmtTime(r.clockOut)}</span><strong>${duration(getWorkMinutes(r,now))}</strong><span>${duration(getBreakMinutes(r,r.clockOut||now))}</span></div>`).join("")}
    function exportCsv(filename,rows){const csv=rows.map(row=>row.map(cell=>`"${String(cell??"").replaceAll('"','""')}"`).join(",")).join("
");const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url)}
    function exportRecords(){const rows=[["員工","日期","上班","休息開始","休息結束","下班","工時分鐘","休息分鐘","加班分鐘","遲到"]];filteredRecords().forEach(r=>rows.push([r.employee,r.date,fmtTime(r.clockIn),fmtTime(r.breakStart),fmtTime(r.breakEnd),fmtTime(r.clockOut),getWorkMinutes(r,r.clockOut?new Date(r.clockOut):new Date()),getBreakMinutes(r,r.clockOut||new Date()),overtimeMinutes(r),isLate(r)?"是":"否"]));exportCsv(`clockin-${dateKey()}.csv`,rows)}
    function exportSalary(){const rows=[["員工","類型","工時分鐘","休息分鐘","加班分鐘","基本薪資","加班費","餐費","全勤","總薪資","遲到","缺卡"]];EMPLOYEES.map(calcSalary).forEach(x=>rows.push([x.name,x.type,x.work,x.rest,x.ot,Math.round(x.base),Math.round(x.otPay),Math.round(x.meal),Math.round(x.attendance),Math.round(x.total),x.late?"是":"否",x.missing?"是":"否"]));exportCsv(`salary-${monthKey()}.csv`,rows)}
    function unlockBoss(){if($("passwordInput").value===BOSS_PASSWORD){bossUnlocked=true;$("passwordModal").classList.remove("show");$("passwordInput").value="";toast("success","老闆頁面已解鎖");switchView("boss")}else{toast("error","密碼錯誤");vibrate(false)}}
    window.addEventListener("DOMContentLoaded",()=>{load();$("staffTab").onclick=()=>switchView("staff");$("bossTab").onclick=()=>switchView("boss");$("passwordSubmit").onclick=unlockBoss;$("passwordCancel").onclick=()=>$("passwordModal").classList.remove("show");$("passwordInput").addEventListener("keydown",e=>{if(e.key==="Enter")unlockBoss()});document.querySelectorAll(".action").forEach(b=>b.onclick=()=>punch(b.dataset.action));$("searchInput").oninput=e=>{query=e.target.value.trim();render()};$("exportRecordsBtn").onclick=exportRecords;$("exportSalaryBtn").onclick=exportSalary;$("clearBtn").onclick=()=>{if(confirm("確定清空測試資料？")){records=[];save();toast("success","已清空測試資料");render()}};render();setInterval(render,1000)});
