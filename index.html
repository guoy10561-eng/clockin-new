<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>打卡系統（測試版）</title>

<style>
body{
  font-family:sans-serif;
  text-align:center;
  padding:30px;
  background:#f5f7fa;
}
.card{
  background:white;
  padding:20px;
  border-radius:16px;
  max-width:400px;
  margin:auto;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
}
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  background:#0f766e;
  color:white;
}
button:disabled{
  background:#ccc;
}
</style>
</head>

<body>

<div class="card">
  <h2>員工打卡（測試）</h2>

  <select id="employee"></select>

</select>

  <p id="status">定位中...</p>

  <button id="btn" disabled onclick="clock()">上班打卡</button>
<div id="recordBox" style="display:none; margin-top:25px;">
  <h3>打卡紀錄</h3>
  <div id="records"></div>
</div>

<div style="margin-top:25px;">
  <h3>管理專區</h3>
  <input type="password" id="adminPwd" placeholder="輸入管理密碼">
  <button onclick="unlockAdmin()">解鎖管理</button>

  <div id="adminPanel" style="display:none; margin-top:15px;">
    <button onclick="exportCSV()">匯出 CSV</button>
    <input id="confirmDelete" placeholder="輸入 DELETE 才能清空">
    <button onclick="clearRecords()" style="background:#dc2626;">清空紀錄</button>
  </div>
</div>

<script>
  const ADMIN_PASSWORD = "931119";
let records = JSON.parse(localStorage.getItem("clock_records") || "[]");
const SHOP = { lat:25.05068, lng:121.59259 };
const MAX_DISTANCE = 150;

let locationOK = false;

function calcDistance(lat,lng){
  const R = 6371000;
  const dLat = (SHOP.lat-lat) * Math.PI/180;
  const dLng = (SHOP.lng-lng) * Math.PI/180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat*Math.PI/180) *
    Math.cos(SHOP.lat*Math.PI/180) *
    Math.sin(dLng/2)**2;

  return Math.round(2*R*Math.asin(Math.sqrt(a)));
}

function getLocation(){
  if(!navigator.geolocation){
    document.getElementById("status").textContent = "裝置不支援定位";
    return;
  }

  navigator.geolocation.getCurrentPosition(pos=>{
    const d = calcDistance(pos.coords.latitude,pos.coords.longitude);

    if(d <= MAX_DISTANCE){
      locationOK = true;
      document.getElementById("status").textContent = "定位通過（"+d+"m）";
    }else{
      locationOK = false;
      document.getElementById("status").textContent = "距離太遠（"+d+"m）";
    }

    updateBtn();

  }, ()=>{
    document.getElementById("status").textContent = "定位失敗";
  });
}

function updateBtn(){
  const emp = document.getElementById("employee").value;
  document.getElementById("btn").disabled = !(emp && locationOK);
}

document.getElementById("employee").addEventListener("change", updateBtn);

function clock(){
  const name = document.getElementById("employee").value;

  if(!name){
    alert("請先選擇員工");
    return;
  }

  if(!locationOK){
    alert("定位未通過，不能打卡");
    return;
  }

  const record = {
    name,
    action: "上班",
    date: new Date().toISOString().slice(0,10),
    time: new Date().toLocaleString("zh-TW", { hour12:false }),
    distance
  };

  records.unshift(record);
  localStorage.setItem("clock_records", JSON.stringify(records));

  alert(`${name} 上班打卡成功`);
  renderRecords();
}
  function renderRecords(){
  const box = document.getElementById("records");
  if(!box) return;

  if(records.length === 0){
    box.innerHTML = "<p>目前沒有紀錄</p>";
    return;
  }

  box.innerHTML = records.map(r => `
    <p>${r.name}｜${r.action}｜${r.time}｜${r.distance}m</p>
  `).join("");
}

function unlockAdmin(){
  const pwd = document.getElementById("adminPwd").value;

  if(pwd === ADMIN_PASSWORD){
    document.getElementById("adminPanel").style.display = "block";
    document.getElementById("recordBox").style.display = "block";
    renderRecords();
  }else{
    alert("密碼錯誤");
  }
}

function exportCSV(){
  let csv = "姓名,動作,日期,時間,距離\n";

  records.forEach(r=>{
    csv += `${r.name},${r.action},${r.date},${r.time},${r.distance}\n`;
  });

  const blob = new Blob(["\uFEFF" + csv], { type:"text/csv;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "clock-records.csv";
  a.click();
}

function clearRecords(){
  if(document.getElementById("confirmDelete").value !== "DELETE"){
    alert("請輸入 DELETE");
    return;
  }

  records = [];
  localStorage.removeItem("clock_records");
  renderRecords();
  alert("紀錄已清空");
}
  const EMPLOYEES = [
  "劉淑貞","洪語婷","林芷亘",
  "劉春美","林佳恆","林禹達",
  "劉穎希","黃韋銘","李品璇",
  "黃王楷","黃啟軒"
];

const select = document.getElementById("employee");

// 🔥 先清空（很重要）
select.innerHTML = "";

// 🔥 加第一個提示
const first = document.createElement("option");
first.value = "";
first.textContent = "請選擇員工";
select.appendChild(first);

// 🔥 正確加入選項
EMPLOYEES.forEach(name=>{
  const opt = document.createElement("option");
  opt.value = name;
  opt.textContent = name;
  select.appendChild(opt);
});

getLocation();
</script>

</body>
</html>
