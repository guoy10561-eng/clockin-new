<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>潮味決南港昆陽店打卡</title>

<style>
body {
  font-family:sans-serif;
  text-align:center;
  padding:30px;
  min-height:100vh;
  margin:0;
  background: linear-gradient(270deg,#ff7e5f,#feb47b,#ff7e5f);
  background-size:600% 600%;
  animation:gradientMove 10s ease infinite;
}

@keyframes gradientMove {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.card {
  background:white;
  border-radius:20px;
  padding:20px;
  margin:20px auto;
  max-width:700px;
}

button {
  padding:12px;
  margin:6px;
  border:none;
  border-radius:10px;
  background:black;
  color:white;
}

select {
  padding:12px;
  margin:10px;
  border-radius:10px;
}

.ripple {
  position:fixed;
  border-radius:50%;
  background:rgba(255,255,255,0.5);
  transform:scale(0);
  animation:ripple 0.6s linear;
}

@keyframes ripple {
  to {transform:scale(6);opacity:0;}
}
</style>
</head>

<body>

<h1 style="color:white;">潮味決南港昆陽店</h1>

<div class="card">

<select id="employeeName" onchange="showEmployeeInfo()">
<option value="">選擇員工</option>
<option>劉淑貞</option>
<option>洪語婷</option>
<option>劉春美</option>
<option>林佳恆</option>
<option>林禹達</option>
<option>劉穎希</option>
<option>林芷亘</option>
<option>黃韋銘</option>
<option>李品璇</option>
<option>黃王楷</option>
<option>黃啟軒</option>
</select>

<p id="employeeInfo"></p>

<button onclick="clockIn()">上班</button>
<button onclick="breakStart()">休息開始</button>
<button onclick="breakEnd()">休息結束</button>
<button onclick="clockOut()">下班</button>

<br><br>

<button onclick="showBoss()">老闆頁面</button>

</div>

<div id="bossPage" class="card" style="display:none;">
<button onclick="exportSalary()">匯出薪資</button>
<div id="records"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://chdznhbloctutfsenstm.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoZHpuaGJsb2N0dXRmc2Vuc3RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTI4MDMsImV4cCI6MjA5MjY4ODgwM30.tYcDc8Yq4WLde0A6pFDG1uouHKx3j34GR_oZwu3H5zE";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const EMPLOYEE_RULES = {
"劉淑貞":8.5,"洪語婷":8.5,"劉春美":6.5,"林佳恆":4,
"林禹達":6,"劉穎希":6,"林芷亘":8,"黃韋銘":4,
"李品璇":4,"黃王楷":4,"黃啟軒":4
};

const EMPLOYEE_SHIFTS = {
"劉淑貞":"09:30-18:00","洪語婷":"10:00-18:30","劉春美":"11:30-18:00",
"林佳恆":"12:00-16:00","林禹達":"12:00-18:00","劉穎希":"12:00-18:00",
"林芷亘":"14:00-22:00","黃韋銘":"18:00-22:00","李品璇":"18:00-22:00",
"黃王楷":"18:00-22:00","黃啟軒":"18:00-22:00"
};

const EMPLOYEE_PAY = {
"劉淑貞":{type:"monthly",salary:45000},
"洪語婷":{type:"monthly",salary:33000},
"劉春美":{type:"hourly",wage:200},
"林佳恆":{type:"hourly",wage:196},
"林禹達":{type:"hourly",wage:200},
"劉穎希":{type:"hourly",wage:196},
"林芷亘":{type:"monthly",salary:30500},
"黃韋銘":{type:"hourly",wage:200},
"李品璇":{type:"hourly",wage:200},
"黃王楷":{type:"hourly",wage:196},
"黃啟軒":{type:"hourly",wage:196}
};

function showEmployeeInfo(){
const name=document.getElementById("employeeName").value;
if(!name)return;

localStorage.setItem("last",name);

document.getElementById("employeeInfo").innerText=
"班別："+EMPLOYEE_SHIFTS[name]+"｜工時："+EMPLOYEE_RULES[name]+"hr";
}

window.onload=function(){
const last=localStorage.getItem("last");
if(last){
document.getElementById("employeeName").value=last;
showEmployeeInfo();
}
}

async function saveClock(action){
const name=document.getElementById("employeeName").value;
if(!name)return alert("選員工");

const today=new Date().toLocaleDateString("zh-TW");

const {data}=await supabaseClient
.from("clock_records")
.select("*")
.eq("employee_name",name)
.eq("action",action);

if(data.some(r=>new Date(r.clock_time).toLocaleDateString("zh-TW")==today)){
alert("今天已打過");
return;
}

await supabaseClient.from("clock_records").insert([
{employee_name:name,action:action}
]);

alert(action+"成功");
}

function clockIn(){saveClock("上班");}
function breakStart(){saveClock("休息開始");}
function breakEnd(){saveClock("休息結束");}
function clockOut(){saveClock("下班");}

function showBoss(){
const p=prompt("密碼");
if(p!=="1234")return;

document.getElementById("bossPage").style.display="block";
}

async function exportSalary(){
const {data}=await supabaseClient.from("clock_records").select("*");

let csv="員工,總薪資\n";

Object.keys(EMPLOYEE_PAY).forEach(name=>{
let pay=EMPLOYEE_PAY[name];
let total=0;

if(pay.type==="monthly"){
total=pay.salary+2000;
}else{
total=10000;
}

csv+=name+","+total+"\n";
});

const blob=new Blob(["\uFEFF"+csv]);
const link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="薪資.csv";
link.click();
}

document.addEventListener("click",e=>{
const ripple=document.createElement("span");
ripple.className="ripple";
ripple.style.width="100px";
ripple.style.height="100px";
ripple.style.left=e.clientX-50+"px";
ripple.style.top=e.clientY-50+"px";
document.body.appendChild(ripple);
setTimeout(()=>ripple.remove(),600);
});
</script>

</body>
</html>
