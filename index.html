<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>潮味決南港昆陽店｜員工打卡系統</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
  background:#f4f7fb;
  color:#0f172a;
  padding:20px;
}
.container{max-width:900px;margin:auto}
.card{
  background:white;
  border-radius:22px;
  padding:24px;
  margin-bottom:20px;
  box-shadow:0 18px 40px rgba(15,23,42,.08);
}
h1,h2,h3{margin-top:0}
select,input,button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:14px;
  font-size:16px;
}
select,input{border:1px solid #d1d5db}
button{
  border:none;
  background:#0f766e;
  color:white;
  font-weight:800;
}
button:disabled{
  background:#cbd5e1;
  color:#64748b;
}
.danger{background:#dc2626}
.status{
  padding:14px;
  border-radius:14px;
  background:#f8fafc;
  margin-top:14px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.record{
  text-align:left;
  padding:12px;
  border-radius:12px;
  background:#f1f5f9;
  margin-top:10px;
}
@media(max-width:700px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="container">

  <div class="card">
    <h1>潮味決南港昆陽店</h1>
    <p>員工打卡系統</p>
  </div>

  <div class="card">
    <h2>員工打卡</h2>

    <select id="employee"></select>

    <div class="status" id="status">定位中...</div>

    <button onclick="getLocation()">重新定位</button>

    <div class="grid" id="actionButtons"></div>
  </div>

  <div class="card">
    <h2>管理專區</h2>

    <input type="password" id="adminPwd" placeholder="輸入管理密碼">
    <button onclick="unlockAdmin()">解鎖管理</button>

    <div id="adminPanel" style="display:none;">
      <h3>打卡紀錄</h3>

      <select id="filterEmployee" onchange="renderRecords()"></select>

      <div id="records"></div>

      <button onclick="exportCSV()">匯出 CSV</button>

      <input id="confirmDelete" placeholder="輸入 DELETE 才能清空">
      <button class="danger" onclick="clearRecords()">清空紀錄</button>
    </div>
  </div>

</div>

<script>
  const SUPABASE_URL = "https://chdznhbloctutfsenstm.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoZHpuaGJsb2N0dXRmc2Vuc3RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTI4MDMsImV4cCI6MjA5MjY4ODgwM30.tYcDc8Yq4WLde0A6pFDG1uouHKx3j34GR_oZwu3H5zE";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);
const EMPLOYEES = [
  "劉淑貞","洪語婷","林芷亘",
  "劉春美","林佳恆","林禹達",
  "劉穎希","黃韋銘","李品璇",
  "黃王楷","黃啟軒","黃昱綺"
];

const ACTIONS = ["上班","休息開始","休息結束","下班"];
const ADMIN_PASSWORD = "931119";

const SHOP = { lat:25.05068, lng:121.59259 };
const MAX_DISTANCE = 150;

let records = JSON.parse(localStorage.getItem("clock_records") || "[]");
let locationOK = false;
let distance = "";

function init(){
  const emp = document.getElementById("employee");
  const filter = document.getElementById("filterEmployee");

  emp.innerHTML = `<option value="">請選擇員工</option>`;
  filter.innerHTML = `<option value="ALL">全部員工</option>`;

  EMPLOYEES.forEach(name=>{
    emp.innerHTML += `<option value="${name}">${name}</option>`;
    filter.innerHTML += `<option value="${name}">${name}</option>`;
  });

  emp.addEventListener("change", renderButtons);

  renderButtons();
  getLocation();
}

function getToday(){
  return new Date().toISOString().slice(0,10);
}

function calcDistance(lat,lng){
  const R = 6371000;
  const dLat = (SHOP.lat-lat) * Math.PI/180;
  const dLng = (SHOP.lng-lng) * Math.PI/180;
  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat*Math.PI/180) *
    Math.cos(SHOP.lat*Math.PI/180) *
    Math.sin(dLng/2)**2;
  return Math.round(2*R*Math.asin(Math.sqrt(a)));
}

function getLocation(){
  const status = document.getElementById("status");
  status.textContent = "定位中...";

  if(!navigator.geolocation){
    status.textContent = "此裝置不支援定位";
    return;
  }

  navigator.geolocation.getCurrentPosition(pos=>{
    distance = calcDistance(pos.coords.latitude,pos.coords.longitude);
    locationOK = distance <= MAX_DISTANCE;

    status.textContent = locationOK
      ? `定位通過，距離 ${distance}m`
      : `距離太遠，距離 ${distance}m`;

    renderButtons();
  },()=>{
    locationOK = false;
    status.textContent = "定位失敗，請開啟定位權限";
    renderButtons();
  });
}

function getTodayRecords(){
  const name = document.getElementById("employee").value;
  return records.filter(r=>r.name===name && r.date===getToday());
}

function renderButtons(){
  const box = document.getElementById("actionButtons");
  const name = document.getElementById("employee").value;

  box.innerHTML = "";

  if(!name){
    box.innerHTML = "<p>請先選擇員工</p>";
    return;
  }

  const done = getTodayRecords().map(r=>r.action);
  let allowed = [];

  if(!done.includes("上班")){
    allowed = ["上班"];
  }else if(done.includes("上班") && !done.includes("休息開始") && !done.includes("下班")){
    allowed = ["休息開始","下班"];
  }else if(done.includes("休息開始") && !done.includes("休息結束")){
    allowed = ["休息結束"];
  }else if(done.includes("休息結束") && !done.includes("下班")){
    allowed = ["下班"];
  }

  ACTIONS.forEach(action=>{
    const btn = document.createElement("button");
    const isDone = done.includes(action);
    const canClick = locationOK && allowed.includes(action) && !isDone;

    btn.textContent = isDone ? `${action} ✅` : action;
    btn.disabled = !canClick;
    btn.onclick = ()=>clock(action);

    box.appendChild(btn);
  });
}

async function clock(action){
  const name = document.getElementById("employee").value;

  if(!name){
    alert("請先選擇員工");
    return;
  }

  if(!locationOK){
    alert("定位未通過，不能打卡");
    return;
  }

  const record = {
    name,
    action,
    date:getToday(),
    time:new Date().toLocaleString("zh-TW",{hour12:false}),
    distance:String(distance || "")
  };

  const { error } = await supabaseClient
    .from("clock_records")
    .insert([record]);

  if(error){
    alert("上傳失敗：" + error.message);
    console.log(error);
    return;
  }

  records.unshift(record);
  localStorage.setItem("clock_records",JSON.stringify(records));

  alert(`${name} ${action}成功`);
  renderButtons();
  renderRecords();
}
  async function loadCloudRecords(){
  const { data, error } = await supabaseClient
    .from("clock_records")
    .select("*")
    .order("created_at", { ascending:false });

  if(error){
    alert("讀取雲端失敗：" + error.message);
    console.log(error);
    return;
  }

  records = data || [];
  localStorage.setItem("clock_records", JSON.stringify(records));

  renderButtons();
  renderRecords();
}
function unlockAdmin(){
  if(document.getElementById("adminPwd").value === ADMIN_PASSWORD){
    document.getElementById("adminPanel").style.display = "block";
    document.getElementById("adminPwd").value = "";
    renderRecords();
  }else{
    alert("密碼錯誤");
  }
}

function renderRecords(){
  const box = document.getElementById("records");
  const filter = document.getElementById("filterEmployee").value;

  let data = records;

  if(filter !== "ALL"){
    data = records.filter(r=>r.name===filter);
  }

  if(data.length === 0){
    box.innerHTML = "<p>目前沒有紀錄</p>";
    return;
  }

  box.innerHTML = data.map(r=>`
    <div class="record">
      <b>${r.name}｜${r.action}</b><br>
      ${r.date} ${r.time}<br>
      距離：${r.distance}m
    </div>
  `).join("");
}

function exportCSV(){
  let csv = "姓名,動作,日期,時間,距離\n";

  records.forEach(r=>{
    csv += `${r.name},${r.action},${r.date},${r.time},${r.distance}\n`;
  });

  const blob = new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "clock-records.csv";
  a.click();
}

function clearRecords(){
  if(document.getElementById("confirmDelete").value !== "DELETE"){
    alert("請輸入 DELETE");
    return;
  }

  records = [];
  localStorage.removeItem("clock_records");

  renderButtons();
  renderRecords();

  alert("紀錄已清空");
}

window.onload = async function(){
  init();
  await loadCloudRecords();
};
</script>

</body>
</html>
