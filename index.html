<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>潮味決南港昆陽店打卡</title>
</head>

<body style="font-family:sans-serif;text-align:center;padding:30px">
  <h1>潮味決南港昆陽店</h1>
  <h2>員工打卡系統</h2>

  <button onclick="showEmployee()">員工打卡</button>
  <button onclick="showBoss()">老闆頁面</button>

  <hr>

  <div id="employeePage">
    <p id="time">時間讀取中...</p>

    <input id="employeeName" placeholder="請輸入員工名字" style="padding:12px;margin:10px">
    <br>

    <button onclick="clockIn()" style="padding:15px;margin:10px">上班打卡</button>
    <button onclick="clockOut()" style="padding:15px;margin:10px">下班打卡</button>
  </div>

  <div id="bossPage" style="display:none">
    <h2>今日打卡紀錄</h2>
    <button onclick="loadRecords()" style="padding:12px;margin:10px">重新整理紀錄</button>
    <div id="records"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://chdznhbloctutfsenstm.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoZHpuaGJsb2N0dXRmc2Vuc3RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTI4MDMsImV4cCI6MjA5MjY4ODgwM30.tYcDc8Yq4WLde0A6pFDG1uouHKx3j34GR_oZwu3H5zE";

    const STORE_LAT = 25.049901606435455;
    const STORE_LNG = 121.59244072858665;
    const MAX_DISTANCE = 0.1; // 0.1公里 = 100公尺

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function updateTime() {
      document.getElementById("time").innerText = new Date().toLocaleString();
    }

    updateTime();
    setInterval(updateTime, 1000);

    function showEmployee() {
      document.getElementById("employeePage").style.display = "block";
      document.getElementById("bossPage").style.display = "none";
    }

    function showBoss() {
      const password = prompt("請輸入老闆密碼");

      if (password !== "1119") {
        alert("密碼錯誤");
        return;
      }

      document.getElementById("employeePage").style.display = "none";
      document.getElementById("bossPage").style.display = "block";
      loadRecords();
    }

    function getDistance(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    async function saveClock(action) {
      const name = document.getElementById("employeeName").value;

      if (!name) {
        alert("請先輸入員工名字");
        return;
      }

      navigator.geolocation.getCurrentPosition(async function(position) {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        const distance = getDistance(lat, lng, STORE_LAT, STORE_LNG);

        if (distance > MAX_DISTANCE) {
          alert("不在店附近，無法打卡！目前距離約 " + Math.round(distance * 1000) + " 公尺");
          return;
        }

        const { error } = await supabaseClient
          .from("clock_records")
          .insert([
            {
              employee_name: name,
              action: action,
              latitude: lat,
              longitude: lng
            }
          ]);

        if (error) {
          alert("打卡失敗：" + error.message);
        } else {
          alert(action + "打卡成功！");
        }

      }, function() {
        alert("定位失敗，請開啟定位權限");
      });
    }

    function clockIn() {
      saveClock("上班");
    }

    function clockOut() {
      saveClock("下班");
    }

    async function loadRecords() {
      const { data, error } = await supabaseClient
        .from("clock_records")
        .select("*")
        .order("clock_time", { ascending: false });

      if (error) {
        document.getElementById("records").innerHTML = "讀取失敗：" + error.message;
        return;
      }

      let html = "<table border='1' style='margin:auto;border-collapse:collapse;width:100%;max-width:500px'>";
      html += "<tr><th>員工</th><th>動作</th><th>時間</th></tr>";

      data.forEach(row => {
        html += `
          <tr>
            <td>${row.employee_name}</td>
            <td>${row.action}</td>
            <td>${new Date(row.clock_time).toLocaleString()}</td>
          </tr>
        `;
      });

      html += "</table>";
      document.getElementById("records").innerHTML = html;
    }
  </script>
</body>
</html>
