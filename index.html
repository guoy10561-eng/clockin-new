<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>潮味決南港昆陽店打卡</title>
</head>

<body style="font-family:sans-serif;text-align:center;padding:50px">
  <h1>潮味決南港昆陽店</h1>
  <h2>員工打卡系統</h2>

  <p id="time">時間讀取中...</p>

  <input id="employeeName" placeholder="請輸入員工名字" style="padding:12px;margin:10px">
  <br>

  <button onclick="clockIn()" style="padding:15px;margin:10px">上班打卡</button>
  <button onclick="clockOut()" style="padding:15px;margin:10px">下班打卡</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://chdznhbloctutfsenstm.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoZHpuaGJsb2N0dXRmc2Vuc3RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTI4MDMsImV4cCI6MjA5MjY4ODgwM30.tYcDc8Yq4WLde0A6pFDG1uouHKx3j34GR_oZwu3H5zE";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function updateTime() {
      document.getElementById("time").innerText = new Date().toLocaleString();
    }

    updateTime();
    setInterval(updateTime, 1000);

    async function saveClock(action) {
      const name = document.getElementById("employeeName").value;

      if (!name) {
        alert("請先輸入員工名字");
        return;
      }

      const { error } = await supabaseClient
        .from("clock_records")
        .insert([
          {
            employee_name: name,
            action: action
          }
        ]);

      if (error) {
        alert("打卡失敗：" + error.message);
      } else {
        alert(action + "打卡成功！");
      }
    }

    function clockIn() {
      saveClock("上班");
    }

    function clockOut() {
      saveClock("下班");
    }
  </script>
</body>
</html>
