<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>潮味決南港昆陽店｜員工打卡系統</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#172033;
  --muted:#6b7280;
  --primary:#0f766e;
  --primary-dark:#115e59;
  --success:#16a34a;
  --danger:#dc2626;
  --border:#e5e7eb;
  --shadow:0 20px 45px rgba(15,23,42,.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;
  background:radial-gradient(circle at top left,rgba(15,118,110,.14),transparent 32%),linear-gradient(180deg,#f8fafc 0%,var(--bg) 100%);
  color:var(--text);
}
.app{width:min(1080px,100%);margin:0 auto;padding:24px}
.header{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:22px}
.brand{display:flex;gap:14px;align-items:center}
.logo{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,var(--primary),#14b8a6);color:white;display:grid;place-items:center;font-weight:800;box-shadow:0 12px 25px rgba(15,118,110,.22)}
h1,h2,h3,p{margin:0} h1{font-size:24px;letter-spacing:.5px}.sub{margin-top:5px;color:var(--muted);font-size:14px}
.time-pill{padding:10px 14px;border:1px solid var(--border);border-radius:999px;background:rgba(255,255,255,.8);color:#334155;font-weight:600;white-space:nowrap}
.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:18px}.card{background:rgba(255,255,255,.92);border:1px solid rgba(226,232,240,.9);border-radius:24px;box-shadow:var(--shadow);padding:22px}.section-title{font-size:18px;font-weight:800;margin-bottom:14px}
label{display:block;font-size:14px;font-weight:700;margin-bottom:8px}select,input{width:100%;height:48px;border:1px solid var(--border);border-radius:14px;padding:0 14px;font-size:16px;background:#fff;color:var(--text);outline:none}select:focus,input:focus{border-color:#14b8a6;box-shadow:0 0 0 4px rgba(20,184,166,.12)}
.status{margin-top:16px;padding:14px;border-radius:18px;background:#f8fafc;border:1px solid var(--border);display:flex;justify-content:space-between;gap:12px;align-items:center}.status-text strong{display:block;margin-bottom:4px}.status-text span{color:var(--muted);font-size:14px}
button{border:0;border-radius:16px;padding:14px 16px;font-size:16px;font-weight:800;cursor:pointer;transition:.18s ease}button:hover{transform:translateY(-1px)}button:disabled{cursor:not-allowed;transform:none}.btn-small{width:auto;background:#e6fffb;color:var(--primary-dark)}
.actions{margin-top:18px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.action-btn{min-height:96px;text-align:left;padding:18px}.action-btn .name{display:block;font-size:20px;margin-bottom:8px}.action-btn .hint{display:block;font-size:13px;font-weight:600;opacity:.75}.enabled{background:linear-gradient(135deg,var(--primary),#14b8a6);color:white;box-shadow:0 16px 30px rgba(15,118,110,.22)}.done{background:#ecfdf5;color:var(--success);border:1px solid #bbf7d0}.locked{background:#f1f5f9;color:#94a3b8;border:1px solid #e2e8f0}
.record-list{display:flex;flex-direction:column;gap:10px}.record{padding:13px 14px;background:#f8fafc;border:1px solid var(--border);border-radius:16px}.record b{display:block;margin-bottom:4px}.record span{color:var(--muted);font-size:13px}.empty{color:var(--muted);padding:16px;border:1px dashed #cbd5e1;border-radius:16px;background:#f8fafc}
.admin-card{margin-top:18px}.admin-row{display:grid;grid-template-columns:1fr auto;gap:10px}.admin-panel{display:none;margin-top:16px;gap:12px}.admin-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.admin-actions button{background:#0f172a;color:white}.danger-box{margin-top:12px;padding:14px;border-radius:18px;background:#fef2f2;border:1px solid #fecaca}.danger-box p{color:#991b1b;font-weight:800;margin-bottom:10px}.danger-btn{width:100%;margin-top:10px;background:var(--danger);color:white}.footer-note{margin-top:18px;color:var(--muted);text-align:center;font-size:12px}
@media(max-width:820px){.app{padding:18px}.header{align-items:flex-start;flex-direction:column}.grid{grid-template-columns:1fr}.actions{grid-template-columns:1fr}.admin-row,.admin-actions{grid-template-columns:1fr}.time-pill{width:100%;text-align:center}}
</style>
</head>

<body>
<div class="app">
  <header class="header">
    <div class="brand"><div class="logo">潮</div><div><h1>潮味決南港昆陽店</h1><p class="sub">員工打卡系統｜Clock-in Management</p></div></div>
    <div class="time-pill" id="nowTime">--</div>
  </header>

  <div class="grid">
    <section class="card">
      <h2 class="section-title">員工打卡</h2>
      <label for="employee">選擇員工</label>
      <select id="employee"></select>
      <div class="status">
        <div class="status-text"><strong id="locationTitle">定位中</strong><span id="locationText">正在取得目前位置...</span></div>
        <button class="btn-small" onclick="getLocation()">重新定位</button>
      </div>
      <div class="actions" id="buttons"></div>
    </section>

    <aside class="card" id="recordSection" style="display:none;">
      <h2 class="section-title">今日紀錄</h2>
      <div class="record-list" id="today"></div>
    </aside>
  </div>

  <section class="card admin-card">
    <h2 class="section-title">管理專區</h2>
    <div class="admin-row">
      <input type="password" id="pwd" placeholder="請輸入管理密碼" />
      <button class="btn-small" onclick="unlock()">解鎖管理</button>
    </div>
    <div class="admin-panel" id="admin">
      <div class="admin-actions">
        <button onclick="exportCSV()">匯出全部紀錄 CSV</button>
        <button onclick="monthly()">匯出本月紀錄</button>
        <button onclick="monthlySalary()">月薪結算</button>
      </div>
      <div class="danger-box">
        <p>危險操作：清空本機暫存紀錄</p>
        <input id="confirm" placeholder="輸入 DELETE 才能清空" />
        <button class="danger-btn" onclick="clearData()">清空本機暫存</button>
      </div>
    </div>
  </section>
  <p class="footer-note">資料已改為 Supabase 雲端同步。</p>
</div>

<script>
const SUPABASE_URL = "https://chdznhbloctutfsenstm.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoZHpuaGJsb2N0dXRmc2Vuc3RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTI4MDMsImV4cCI6MjA5MjY4ODgwM30.tYcDc8Yq4WLde0A6pFDG1uouHKx3j34GR_oZwu3H5zE";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const EMPLOYEES = ["劉淑貞","洪語婷","劉春美","林佳恆","林禹達","劉穎希","林芷亘","黃韋銘","李品璇","黃王楷","黃啟軒"];
const ACTIONS = ["上班","休息開始","休息結束","下班"];
const PASSWORD = "931119";
const SHOP = { lat:25.05068, lng:121.59259 };
const MAX_DISTANCE = 150;

const PAY_CONFIG = {
  "劉淑貞": { type:"monthly", base:45000 },
  "洪語婷": { type:"monthly", base:33000 },
  "林芷亘": { type:"monthly", base:30500 },
  "劉春美": { type:"hourly", rate:200 },
  "林佳恆": { type:"hourly", rate:196 },
  "林禹達": { type:"hourly", rate:200 },
  "劉穎希": { type:"hourly", rate:196 },
  "黃韋銘": { type:"hourly", rate:200 },
  "李品璇": { type:"hourly", rate:200 },
  "黃王楷": { type:"hourly", rate:196 },
  "黃啟軒": { type:"hourly", rate:196 }
};

let records = [];
let distance = null;
let locationOK = false;
let empSelect = null;

function recordName(r){ return r.employee_name || r.name || ""; }
function getToday(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function formatTime(value){
  if(!value) return "";
  const d = new Date(value);
  if(Number.isNaN(d.getTime())) return value;
  return d.toLocaleString("zh-TW", { hour12:false });
}
function updateClock(){
  document.getElementById("nowTime").textContent = new Date().toLocaleString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});
}
function initEmployees(){
  empSelect = document.getElementById("employee");
  empSelect.innerHTML = "";
  EMPLOYEES.forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    empSelect.appendChild(opt);
  });
  empSelect.addEventListener("change", renderButtons);
}
function setLocationStatus(title,text,ok){
  document.getElementById("locationTitle").textContent = title;
  document.getElementById("locationText").textContent = text;
  locationOK = ok;
}
function calcDistance(lat,lng){
  const R = 6371000;
  const dLat = (SHOP.lat-lat) * Math.PI / 180;
  const dLng = (SHOP.lng-lng) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat*Math.PI/180) * Math.cos(SHOP.lat*Math.PI/180) * Math.sin(dLng/2)**2;
  return Math.round(2 * R * Math.asin(Math.sqrt(a)));
}
function getLocation(){
  setLocationStatus("定位中", "正在取得目前位置...", false);
  if(!navigator.geolocation){ setLocationStatus("無法定位", "此裝置不支援定位功能", false); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    distance = calcDistance(pos.coords.latitude,pos.coords.longitude);
    locationOK = distance <= MAX_DISTANCE;
    setLocationStatus(locationOK ? "定位通過" : "距離過遠", locationOK ? `距離店鋪約 ${distance} 公尺，可以打卡` : `距離店鋪約 ${distance} 公尺，超過 ${MAX_DISTANCE} 公尺限制`, locationOK);
  }, () => {
    setLocationStatus("定位失敗", "請開啟瀏覽器定位權限後重新定位", false);
  }, { enableHighAccuracy:true, timeout:10000, maximumAge:30000 });
}
function getShift(){ return new Date().getHours() < 15 ? "早班" : "晚班"; }
function getTodayRecords(){
  if(!empSelect) return [];
  return records.filter(r => recordName(r) === empSelect.value && r.date === getToday());
}
function renderButtons(){
  const box = document.getElementById("buttons");
  const done = getTodayRecords().map(r => r.action);
  let allowedActions = [];

  if(!done.includes("上班")) allowedActions = ["上班"];
  else if(done.includes("上班") && !done.includes("休息開始") && !done.includes("下班")) allowedActions = ["休息開始","下班"];
  else if(done.includes("休息開始") && !done.includes("休息結束")) allowedActions = ["休息結束"];
  else if(done.includes("休息結束") && !done.includes("下班")) allowedActions = ["下班"];

  box.innerHTML = "";
  ACTIONS.forEach(action => {
    const btn = document.createElement("button");
    const isDone = done.includes(action);
    const isAllowed = allowedActions.includes(action);
    btn.className = "action-btn " + (isDone ? "done" : isAllowed ? "enabled" : "locked");
    btn.disabled = isDone || !isAllowed;
    btn.innerHTML = `<span class="name">${action}</span><span class="hint">${isDone ? "已完成" : isAllowed ? "可以打卡" : "尚未開放"}</span>`;
    if(isAllowed && !isDone) btn.onclick = () => clock(action);
    box.appendChild(btn);
  });
  renderToday();
}
async function clock(action){
  if(!empSelect || !empSelect.value){ alert("請先選擇員工"); return; }
  if(getTodayRecords().some(r => r.action === action)){ alert("這個已經打過卡了"); return; }
  if(!locationOK){ alert("目前定位未通過，不能打卡。請先確認定位。"); return; }

  const newRecord = {
    employee_name: empSelect.value,
    action,
    date: getToday(),
    time: new Date().toISOString(),
    distance: String(distance || ""),
    device: navigator.userAgent,
    shift: getShift()
  };

  const { error } = await supabaseClient.from("clock_records").insert([newRecord]);
  if(error){
    alert("上傳失敗：" + error.message + "
" + JSON.stringify(error));
    console.log(error);
    return;
  }

  records.unshift(newRecord);
  renderButtons();
  alert(`${empSelect.value} 已完成「${action}」打卡`);
}
async function loadCloudRecords(){
  const { data, error } = await supabaseClient.from("clock_records").select("*").order("created_at", { ascending:false });
  if(error){ console.log(error); alert("讀取雲端失敗：" + error.message); return; }
  records = data || [];
  renderButtons();
}
function renderToday(){
  const data = getTodayRecords();
  const box = document.getElementById("today");
  if(!box) return;
  if(data.length === 0){ box.innerHTML = `<div class="empty">今天尚無打卡紀錄</div>`; return; }
  box.innerHTML = data.map(r => `<div class="record"><b>${recordName(r)}｜${r.action}</b><span>${formatTime(r.time)} · ${r.distance || "?"} 公尺</span></div>`).join("");
}
function calcHoursDetail(dayRecords){
  const start = dayRecords.find(r => r.action === "上班");
  const end = dayRecords.find(r => r.action === "下班");
  if(!start || !end) return { work:0, overtime:0 };
  const startTime = new Date(start.time);
  const endTime = new Date(end.time);
  if(Number.isNaN(startTime.getTime()) || Number.isNaN(endTime.getTime())) return { work:0, overtime:0 };

  const shift = start.shift || "早班";
  const overtimeStart = new Date(startTime);
  if(shift === "早班") overtimeStart.setHours(18,10,0,0);
  else overtimeStart.setHours(22,10,0,0);

  const total = Math.max(0, (endTime - startTime) / 1000 / 60 / 60);
  const overtime = endTime > overtimeStart ? Math.max(0, (endTime - overtimeStart) / 1000 / 60 / 60) : 0;
  return { work: Math.max(0, total - overtime), overtime };
}
function calcMeal(hours){ if(hours >= 5) return 100; if(hours >= 4) return 50; return 0; }
function checkFullAttendance(name){
  const month = new Date().toISOString().slice(0,7);
  const userRecords = records.filter(r => recordName(r) === name && r.date && r.date.startsWith(month));
  const days = {};
  userRecords.forEach(r => { if(!days[r.date]) days[r.date] = []; days[r.date].push(r.action); });
  const dates = Object.keys(days);
  if(dates.length === 0) return 0;
  return dates.every(d => days[d].includes("上班") && days[d].includes("下班")) ? 1000 : 0;
}
function calcSalaryDetail(name, dayRecords){
  const config = PAY_CONFIG[name];
  if(!config) return null;
  const { work, overtime } = calcHoursDetail(dayRecords);
  const meal = calcMeal(work);
  if(config.type === "hourly"){
    const base = work * config.rate;
    const overtimePay = overtime * config.rate;
    return { type:"hourly", work, overtime, base:Math.round(base), overtimePay:Math.round(overtimePay), meal, total:Math.round(base + overtimePay + meal) };
  }
  const overtimePay = overtime * 200;
  const fullAttendance = checkFullAttendance(name);
  return { type:"monthly", work, overtime, base:config.base, meal:1000, fullAttendance, overtimePay:Math.round(overtimePay), total:config.base + 1000 + fullAttendance + Math.round(overtimePay) };
}
function makeCSV(data){
  let csv = "姓名,動作,日期,時間,距離,裝置
";
  data.forEach(r => { csv += `"${recordName(r)}","${r.action}","${r.date}","${formatTime(r.time)}","${r.distance || ""}","${r.device || ""}"
`; });
  return "﻿" + csv;
}
function downloadCSV(filename, content){
  const blob = new Blob([content], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}
function exportCSV(){ downloadCSV(`clock-records-${getToday()}.csv`, makeCSV(records)); }
function monthly(){
  const month = new Date().toISOString().slice(0,7);
  downloadCSV(`monthly-records-${month}.csv`, makeCSV(records.filter(r => r.date && r.date.startsWith(month))));
}
function monthlySalary(){
  const month = new Date().toISOString().slice(0,7);
  let csv = "姓名,類型,工時,加班,餐費,薪資
";
  EMPLOYEES.forEach(name => {
    const userRecords = records.filter(r => recordName(r) === name && r.date && r.date.startsWith(month));
    const days = {};
    userRecords.forEach(r => { if(!days[r.date]) days[r.date] = []; days[r.date].push(r); });
    let totalWork = 0, totalOT = 0, totalMeal = 0, totalHourlySalary = 0;
    Object.keys(days).forEach(date => {
      const salary = calcSalaryDetail(name, days[date]);
      if(!salary) return;
      totalWork += salary.work || 0;
      totalOT += salary.overtime || 0;
      if(salary.type === "hourly"){
        totalMeal += salary.meal || 0;
        totalHourlySalary += salary.total || 0;
      }
    });
    const config = PAY_CONFIG[name];
    if(!config) return;
    if(config.type === "monthly"){
      const full = checkFullAttendance(name);
      const monthlyOTPay = Math.round(totalOT * 200);
      const total = config.base + 1000 + full + monthlyOTPay;
      csv += `${name},monthly,${totalWork.toFixed(2)},${totalOT.toFixed(2)},1000,${total}
`;
    }else{
      csv += `${name},hourly,${totalWork.toFixed(2)},${totalOT.toFixed(2)},${totalMeal},${Math.round(totalHourlySalary)}
`;
    }
  });
  downloadCSV(`月薪結算-${month}.csv`, "﻿" + csv);
}
function unlock(){
  if(document.getElementById("pwd").value === PASSWORD){
    document.getElementById("admin").style.display = "block";
    document.getElementById("recordSection").style.display = "block";
    document.getElementById("pwd").value = "";
    renderToday();
  }else alert("密碼錯誤");
}
function clearData(){
  if(document.getElementById("confirm").value !== "DELETE"){ alert("請輸入 DELETE 才能清空紀錄"); return; }
  records = [];
  renderButtons();
  alert("本機暫存已清空，雲端資料不受影響。");
}

document.addEventListener("DOMContentLoaded", async () => {
  try{
    initEmployees();
    updateClock();
    setInterval(updateClock,1000);
    renderButtons();
    getLocation();
    await loadCloudRecords();
  }catch(e){
    console.error("初始化錯誤：", e);
    alert("系統初始化錯誤，請截圖 Console 給 November。" + e.message);
  }
});
</script>
</body>
</html>
