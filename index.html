<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>潮味決南港昆陽店打卡</title>
</head>
<body style="font-family:sans-serif;text-align:center;padding:50px">
  <h1>潮味決南港昆陽店</h1>
  <h2>員工打卡系統</h2>

  <p id="time"></p>

  <button onclick="clockIn()" style="padding:15px;margin:10px">上班打卡</button>
  <button onclick="clockOut()" style="padding:15px;margin:10px">下班打卡</button>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const SUPABASE_URL = "https://chdznhbloctutfsenstm.supabase.co/rest/v1/";
const SUPABASE_KEY = "sb_publishable_rg_KIkolbor3jmbYcZ9WhQ_5ranwHNp";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ✅ 修正：時間顯示
function updateTime() {
  document.getElementById("time").innerText = new Date().toLocaleString();
}
setInterval(updateTime, 1000);
updateTime(); // ← 這行很重要（馬上顯示）

// ✅ 上班打卡
async function clockIn() {
  const { error } = await supabase.from("clock_records").insert([
    {
      employee_name: "員工A",
      action: "上班",
    }
  ]);

  if (error) {
    alert("打卡失敗");
  } else {
    alert("上班打卡成功！");
  }
}

// ✅ 下班打卡
async function clockOut() {
  const { error } = await supabase.from("clock_records").insert([
    {
      employee_name: "員工A",
      action: "下班",
    }
  ]);

  if (error) {
    alert("打卡失敗");
  } else {
    alert("下班打卡成功！");
  }
}
</script>
</body>
</html>
